<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Conecte-se</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container px-3">
        <div class="login-modal">
            
            <div class="text-center mb-5">
                <h1 class="login-title mb-2">
                    <i class="bi bi-stars me-2"></i>Lumind
                </h1>
                <p class="login-subtitle">Plataforma de Suporte ao Autismo</p>
            </div>

            <div id="erro-login" class="alert alert-danger d-none" style="font-size: 0.9rem;" role="alert"></div>

            <form id="form-login">
                <div class="form-floating mb-4">
                    <input type="email" name="email" class="form-control rounded-4 login-input" id="email" placeholder="email" required>
                    <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>E-mail</label>
                </div>

                <div class="form-floating mb-2 position-relative">
                    <input type="password" name="senha" class="form-control rounded-4 login-input" id="senha" placeholder="senha" required>
                    <label for="senha" class="text-muted"><i class="bi bi-lock me-2"></i>Senha</label>
                    <span class="position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer text-muted" id="togglePassword">
                        <i class="bi bi-eye-slash" id="eyeIcon"></i>
                    </span>
                </div>
                
                <div class="text-end mb-4">
                    <a href="#" class="text-primary small fw-semibold text-decoration-none" data-bs-toggle="modal" data-bs-target="#modalRecuperarSenha">Esqueci minha senha</a>
                </div>

                <div>
                    <button type="submit" id="enviar" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm btn-login">
                        <span id="btn-text">Entrar</span>
                        <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                </div>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted small mb-3">Não tem um login?</p>
                <a href="../home/cadastro_profissional.html" class="btn btn-outline-primary rounded-pill px-4 fw-bold">
                    Cadastre-se!
                </a>
            </div>
            
        </div>
    </div>

    <div class="modal fade" id="modalRecuperarSenha" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary"><i class="bi bi-shield-lock me-2"></i>Recuperar Senha</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    
                    <div id="alerta-recuperacao" class="alert d-none py-2" style="font-size: 0.85rem;"></div>

                    <div id="etapa-1">
                        <p class="text-muted small mb-3">Digite o e-mail cadastrado. Enviaremos um código de 6 dígitos para você redefinir sua senha.</p>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control rounded-3" id="email_recuperacao" placeholder="E-mail">
                            <label for="email_recuperacao" class="text-muted">Seu E-mail</label>
                        </div>
                        <button type="button" id="btn-solicitar-pin" class="btn btn-primary w-100 rounded-pill fw-bold">Enviar Código</button>
                    </div>

                    <div id="etapa-2" class="d-none">
                        <p class="text-muted small mb-3">Código enviado! Verifique sua caixa de entrada ou spam.</p>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control rounded-3 text-center fw-bold fs-4 letter-spacing-2" id="pin_seguranca" placeholder="000000" maxlength="6">
                            <label for="pin_seguranca" class="text-muted">Código de 6 dígitos</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control rounded-3" id="nova_senha" placeholder="Nova Senha">
                            <label for="nova_senha" class="text-muted">Sua Nova Senha</label>
                        </div>
                        <button type="button" id="btn-redefinir" class="btn btn-primary w-100 rounded-pill fw-bold">Salvar Nova Senha</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/usuario_login.js"></script>
    <script src="../js/recuperar_senha.js"></script>
</body>
</html>
