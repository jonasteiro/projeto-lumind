<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Relatórios dos Pacientes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/tela_profissional.css">
</head>
<body>
    <div class="tela-admin">
        <aside class="sidebar">
            <div class="sidebar-brand d-flex align-items-center p-4">
                <img src="../css/logo-lumind.png" alt="Lumind" class="brand-logo" onerror="this.style.display='none'">
                <span class="h4 m-0 ms-2">Lumind</span>
            </div>
            <div class="user-card text-center p-4">
                <strong id="nome-usuario" class="d-block text-truncate">Carregando...</strong>
                <small class="text-muted">Profissional da saúde</small>
            </div>
            <nav class="nav flex-column p-3">
                <a href="tela_profissional.html" class="nav-link"><i class="bi bi-house-door-fill"></i> INICIAL</a>
                <a href="atividades_painel.html" class="nav-link"><i class="bi bi-file-earmark-medical"></i> ATIVIDADES</a>
                <a href="#" class="nav-link active"><i class="bi bi-journal-text"></i> RELATÓRIOS</a>
                <a href="lista_pessoa_tea.html" class="nav-link"><i class="bi bi-person-circle"></i> PACIENTES</a>
                <a href="lista_responsavel.html" class="nav-link"><i class="bi bi-people"></i> RESPONSÁVEIS</a>
                <a href="#" id="logoff" class="nav-link"><i class="bi bi-box-arrow-right"></i> SAIR</a>
            </nav>
            <div class="sidebar-footer text-center p-3 mt-auto">
                <small>Versão 1.0</small>
            </div>
        </aside>

        <main class="main-panel">
            <header class="topbar d-flex justify-content-between align-items-center p-4">
                <div class="d-flex align-items-center">
                    <a href="tela_profissional.html" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
                    <h2>RELATÓRIOS DOS PACIENTES</h2>
                </div>
                <div class="search-box d-flex align-items-center">
                    <i class="bi bi-search"></i>
                    <input type="search" id="input-filtro" class="form-control form-control-sm ms-2" placeholder="Filtrar por paciente ou responsável">
                </div>
            </header>

            <section class="content p-4">
                <div id="lista-relatorios" class="row g-4">
                    <p class="text-center text-muted">Buscando relatórios...</p>
                </div>
            </section>
        </main>
    </div>

    <div class="modal fade" id="modalRelatorio" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content shadow border-0">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold text-primary">Detalhes do Relatório</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="text-muted small text-uppercase fw-bold">Paciente</label>
                        <p id="modal-paciente" class="fw-bold mb-0 fs-5"></p>
                    </div>
                    <div class="row mb-3">
                        <div class="col-12">
                            <label class="text-muted small text-uppercase fw-bold">Data</label>
                            <p id="modal-data" class="mb-0"></p>
                        </div>
                    </div>
                    <div class="mb-0">
                        <label class="text-muted small text-uppercase fw-bold">Descrição Completa</label>
                        <div id="modal-descricao" class="p-3 bg-light rounded border border-light-subtle" 
                             style="white-space: pre-wrap; word-wrap: break-word; min-height: 150px; max-height: 500px; overflow-y: auto;">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/profissional/lista_relatorios.js"></script>
    <script>
        if (typeof validarAcesso === "function") validarAcesso('ProfissionalSaude');
    </script>
</body>
</html>
