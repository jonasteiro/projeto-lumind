<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Cadastro de Paciente TEA</title>
    
    <link rel="stylesheet" href="../css/administrador/cadastro_admin.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>Cadastro de Paciente (TEA)</h1>
                <p class="subtitle">Registrar nova pessoa com TEA no sistema</p>
            </div>
            <button class="btn-voltar" onclick="voltarPerfis()">← Voltar</button>
        </header>

        <main class="form-container">
            <form id="formCadastroPessoaTea" class="formulario-adm">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input type="text" id="nome" name="nome" placeholder="Nome do paciente" required maxlength="100">
                    <span class="form-error" id="erroNome"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email (Login) *</label>
                        <input type="email" id="email" name="email" placeholder="email@exemplo.com" required maxlength="100">
                        <span class="form-error" id="erroEmail"></span>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" name="cpf" placeholder="Apenas números" required maxlength="14">
                        <span class="form-error" id="erroCpf"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="data_nascimento">Data de Nascimento *</label>
                        <input type="date" id="data_nascimento" name="data_nascimento" required>
                        <span class="form-error" id="erroData"></span>
                    </div>
                    <div class="form-group">
                        <label for="nivel_tea">Nível de Suporte (TEA) *</label>
                        <select id="nivel_tea" name="nivel_tea" required>
                            <option value="">Selecione o nível</option>
                            <option value="Nível 1 - Suporte Leve">Nível 1 - Suporte Leve</option>
                            <option value="Nível 2 - Suporte Moderado">Nível 2 - Suporte Moderado</option>
                            <option value="Nível 3 - Suporte Substancial">Nível 3 - Suporte Substancial</option>
                        </select>
                        <span class="form-error" id="erroNivel"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="observacao">Observações Clínicas / Comportamentais</label>
                    <textarea id="observacao" name="observacao" rows="3" placeholder="Detalhes importantes sobre o paciente..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefone">Telefone (Opcional)</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="DDD + Número">
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha de Acesso *</label>
                        <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
                        <span class="form-error" id="erroSenha"></span>
                    </div>
                </div>

                <!-- 
                COLOCAR AQUI TRATAMENTO DE EXCEÇÃO 
                <div class="form-group">
                    <label for="email_exercicio">E-mail do Exercício *</label>
                    <input type="text" id="email_exercicio" placeholder="Digite para testar o @">
                    
                    COLOCAR AQUI ERRO E ID
                    <p id="erro_exercicio"></p>
                </div>
                -->

                <div id="divErro" class="alert alert-error"></div>
                <div id="divSucesso" class="alert alert-success"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"><span>💾</span> Cadastrar Paciente</button>
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()"><span>🔄</span> Limpar</button>
                </div>
            </form>
        </main>
    </div>
    
    <script src="../js/pessoa_tea.js/pessoa_tea_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(['ProfissionalSaude']); 
        }
    </script>
</body>
</html>
