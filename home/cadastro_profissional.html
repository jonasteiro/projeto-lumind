<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Cadastro de Profissional</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/login.css">
    <style>
        .login-modal {
            max-width: 700px;
        }
    </style>
</head>
<body style="background: #f8fcff;">

    <div class="login-container px-3 my-5">
        <div class="login-modal shadow-lg p-4 p-md-5 bg-white rounded-4 border border-light-subtle">
            
            <div class="text-center mb-4">
                <h1 class="login-title mb-2 fw-bold text-primary">Seja um Profissional Lumind</h1>
                <p class="login-subtitle text-muted">Preencha os dados abaixo para análise de perfil</p>
            </div>

            <form id="form-cadastro-prof" enctype="multipart/form-data">
                <input type="hidden" name="tipo_usuario" value="ProfissionalSaude">

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small fw-bold text-muted"><i class="bi bi-person me-1"></i> Nome Completo *</label>
                        <input type="text" name="nome" id="nome" class="form-control rounded-3" placeholder="Ex: Maria Silva" required>
                        <span class="text-danger small d-none mt-1" id="erroNome"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted"><i class="bi bi-envelope me-1"></i> E-mail *</label>
                        <input type="email" name="email" id="email" class="form-control rounded-3" placeholder="seu@email.com" required>
                        <span class="text-danger small d-none mt-1" id="erroEmail"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted"><i class="bi bi-card-text me-1"></i> CPF *</label>
                        <input type="text" name="cpf" id="cpf" maxlength="11" class="form-control rounded-3" placeholder="Apenas números" required>
                        <span class="text-danger small d-none mt-1" id="erroCpf"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted"><i class="bi bi-award me-1"></i> Registro (CRP/CRM) *</label>
                        <input type="text" name="registro_profissional" id="registro_profissional" class="form-control rounded-3" required>
                        <span class="text-danger small d-none mt-1" id="erroRegistro"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted"><i class="bi bi-briefcase me-1"></i> Especialidade *</label>
                        <input type="text" name="especialidade" id="especialidade" class="form-control rounded-3" placeholder="Ex: Psicologia Infantil" required>
                        <span class="text-danger small d-none mt-1" id="erroEspecialidade"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted"><i class="bi bi-calendar-event me-1"></i> Data de Nascimento *</label>
                        <input type="date" name="data_nascimento" id="data_nascimento" class="form-control rounded-3" required>
                        <span class="text-danger small d-none mt-1" id="erroData"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted"><i class="bi bi-telephone me-1"></i> Telefone</label>
                        <input type="text" name="telefone" id="telefone" class="form-control rounded-3" placeholder="DDD + Número">
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label small fw-bold text-muted"><i class="bi bi-lock me-1"></i> Crie sua Senha *</label>
                        <input type="password" name="senha" id="senha" class="form-control rounded-3" placeholder="Mínimo 6 caracteres" required>
                        <span class="text-danger small d-none mt-1" id="erroSenha"></span>
                    </div>
                </div>

                <div class="p-4 bg-light rounded-4 mb-4 border border-light-subtle">
                    <h6 class="fw-bold mb-3 text-dark"><i class="bi bi-shield-check me-2 text-success fs-5"></i>Documentação Obrigatória</h6>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Certificação Profissional (Diploma ou Certificado)</label>
                        <input type="file" name="certificacao_profissional" id="certificacao" class="form-control form-control-sm border-secondary-subtle" accept=".pdf,image/*" required>
                        <span class="text-danger small d-none mt-1" id="erroCertificacao"></span>
                    </div>

                    <div class="mb-0">
                        <label class="form-label small fw-semibold text-muted">Documento de Identidade (RG ou CNH)</label>
                        <input type="file" name="carteira_identidade_nacional" id="identidade" class="form-control form-control-sm border-secondary-subtle" accept=".pdf,image/*" required>
                        <span class="text-danger small d-none mt-1" id="erroIdentidade"></span>
                    </div>
                </div>

                <button type="submit" id="btn-cadastrar" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm mb-3">
                    <i class="bi bi-send-fill me-2"></i> Enviar Solicitação
                </button>
                
                <div class="text-center mt-2">
                    <a href="../login/index.html" class="text-decoration-none small fw-bold text-primary">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Já possui conta? Faça login
                    </a>
                </div>

                <div class="text-center mt-3">
                    <a href="../home/status_profissional.html" class="text-decoration-none small fw-bold text-secondary">
                        <i class="bi bi-search me-1"></i> Verifique seu cadastro
                    </a>
                </div>
            </form>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/profissional/profissional_novo.js"></script>
</body>
</html>
