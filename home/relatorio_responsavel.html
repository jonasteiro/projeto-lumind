<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Novo Relatório</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/tela_responsavel.css">

    <style>
        /* Alerta de validação de texto */
        #alerta-descricao {
            display: none;
            font-size: 0.85rem;
        }
        #contador-chars {
            font-size: 0.8rem;
            color: #6c757d;
        }
        #contador-chars.valido {
            color: #198754; /* verde Bootstrap */
        }
        #contador-chars.invalido {
            color: #dc3545; /* vermelho Bootstrap */
        }
    </style>
</head>
<body>
    <div class="tela-responsavel">
        <aside class="sidebar">
            <div class="sidebar-brand d-flex align-items-center p-4">
                <img src="../css/logo-lumind.png" alt="Lumind" class="brand-logo" onerror="this.style.display='none'">
                <span class="h4 m-0 ms-2">Lumind</span>
            </div>
            <nav class="nav flex-column p-3">
                <a href="tela_responsavel.html" class="nav-link"><i class="bi bi-house-door-fill"></i> INICIAL</a>
                <a href="atividades_responsavel.html" class="nav-link"><i class="bi bi-clipboard-check"></i> ATIVIDADES</a>
                <a href="#" class="nav-link active"><i class="bi bi-journal-text"></i> RELATÓRIOS</a>
                <a href="#" id="logoff" class="nav-link"><i class="bi bi-box-arrow-right"></i> SAIR</a>
            </nav>
            <div class="sidebar-footer text-center p-3">
                <small>Versão 1.0</small>
            </div>
        </aside>

        <main class="main-panel">
            <header class="topbar d-flex justify-content-between align-items-center p-4">
                <div class="d-flex align-items-center">
                    <a href="tela_responsavel.html" class="btn btn-sm btn-outline-secondary me-3">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h2>NOVO RELATÓRIO</h2>
                </div>
                <div class="d-flex align-items-center">
                    <span id="nome-usuario" class="me-3 fw-semibold">Carregando...</span>
                </div>
            </header>

            <section class="content p-4">
                <div class="row justify-content-center">
                    <div class="col-12 col-lg-8">

                        <!-- Alerta de sucesso/erro global -->
                        <div id="alerta-global" class="alert d-none mb-4" role="alert"></div>

                        <div class="card border-0 shadow-sm p-4">
                            <h5 class="fw-bold mb-4">Preencha os dados do relatório</h5>

                            <!-- CENÁRIO 1: Drop-down de dependentes (preenchido via JS) -->
                            <div class="mb-3">
                                <label for="select-dependente" class="form-label fw-semibold">
                                    Dependente <span class="text-danger">*</span>
                                </label>
                                <select id="select-dependente" class="form-select" required>
                                    <option value="" disabled selected>Carregando dependentes...</option>
                                </select>
                            </div>

                            <!-- CENÁRIO 2: Data retroativa (max = hoje, via JS) -->
                            <div class="mb-3">
                                <label for="input-data" class="form-label fw-semibold">
                                    Data do Evento <span class="text-danger">*</span>
                                </label>
                                <input type="date" id="input-data" class="form-control" required>
                                <small class="text-muted">Selecione a data em que o evento ocorreu. Datas futuras são bloqueadas.</small>
                            </div>

                            <!-- CENÁRIO 3: Textarea com validação em tempo real -->
                            <div class="mb-4">
                                <label for="textarea-descricao" class="form-label fw-semibold">
                                    Descrição <span class="text-danger">*</span>
                                </label>
                                <textarea id="textarea-descricao"
                                          class="form-control"
                                          rows="6"
                                          placeholder="Descreva o evento ou comportamento observado..."
                                          required></textarea>
                                <!-- Contador de caracteres em tempo real -->
                                <div class="d-flex justify-content-between align-items-center mt-1">
                                    <div id="alerta-descricao" class="alert alert-warning py-1 px-2 mb-0 small">
                                        <i class="bi bi-exclamation-triangle-fill me-1"></i>
                                        Escreva pelo menos 30 caracteres
                                    </div>
                                    <span id="contador-chars" class="ms-auto invalido">0/30 caracteres</span>
                                </div>
                            </div>

                            <button id="btn-salvar" class="btn btn-primary w-100 fw-bold py-2 rounded-pill">
                                <span id="btn-text"><i class="bi bi-send-fill me-2"></i>ENVIAR RELATÓRIO</span>
                                <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                        </div>

                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/valida_sessao.js"></script>
    <script src="../js/responsavel/relatorio.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso('ResponsavelLegal');
        }
    </script>
</body>
</html>
