<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Cadastro de Responsável Legal</title>
    <link rel="stylesheet" href="../css/administrador/cadastro_admin.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>Cadastro de Responsável Legal</h1>
                <p class="subtitle">Registrar o responsável pela pessoa com TEA</p>
            </div>
            <button class="btn-voltar" onclick="voltarPerfis()">← Voltar</button>
        </header>

        <main class="form-container">
            <form id="formCadastroResponsavel" class="formulario-adm">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required maxlength="100">
                    <span class="form-error" id="erroNome"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" placeholder="exemplo@email.com" required maxlength="100">
                        <span class="form-error" id="erroEmail"></span>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" name="cpf" placeholder="Apenas números" required maxlength="14">
                        <span class="form-error" id="erroCpf"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefone">Telefone/WhatsApp *</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="DDD + Número" required maxlength="15">
                        <span class="form-error" id="erroTelefone"></span>
                    </div>

                    <div class="form-group">
                        <label for="data_nascimento">Data de Nascimento *</label>
                        <input type="date" id="data_nascimento" name="data_nascimento" required>
                        <span class="form-error" id="erroData"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha de Acesso *</label>
                    <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
                    <span class="form-error" id="erroSenha"></span>
                </div>

                <div id="divErro" class="alert alert-error"></div>
                <div id="divSucesso" class="alert alert-success"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <span>💾</span> Cadastrar Responsável
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                        <span>🔄</span> Limpar
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="../js/responsavel/responsavel_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(['ProfissionalSaude', 'Administrador']); 
        }
    </script>
</body>
</html>
