<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Gestão de Administradores</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/tela_administrador.css">
    <link rel="stylesheet" href="../css/administrador/lista_administrador.css">
</head>
<body style="background: #f8fcff;">
    
    <main class="w-100 min-vh-100 d-flex flex-column">
        
        <header class="topbar d-flex justify-content-between align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            <div class="d-flex align-items-center container-xl">
                
                <a href="tela_administrador.html" class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;" onmouseover="this.style.backgroundColor='#a8d6f5'" onmouseout="this.style.backgroundColor='#bce2f9'">
                    <i class="bi bi-arrow-left fs-4"></i>
                </a>
                
                <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">GESTÃO DE ADMINISTRADORES</h2>
                
            </div>
        </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-light-subtle">
                <div>
                    <h2 class="h4 mb-1 fw-bold text-dark">Equipe de Administração</h2>
                    <p class="text-muted small mb-0">Gerencie as pessoas que possuem acesso total ao painel.</p>
                </div>
                <button id="btnNovoAdmin" class="btn btn-primary rounded-pill fw-semibold shadow-sm px-4 d-flex align-items-center gap-2">
                    <i class="bi bi-plus-lg"></i> Novo Admin
                </button>
            </div>

            <div class="table-responsive bg-white rounded-4 shadow-sm border border-light-subtle p-2">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="text-secondary fw-semibold py-3 ps-3">Nome</th>
                            <th class="text-secondary fw-semibold py-3">E-mail</th>
                            <th class="text-secondary fw-semibold py-3">CPF</th>
                            <th class="text-secondary fw-semibold py-3 text-center">Status</th>
                            <th class="text-secondary fw-semibold py-3 text-end pe-3">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-admins-body">
                        <tr>
                            <td colspan="5" class="text-center py-5 text-muted">
                                <div class="spinner-border text-primary mb-2" role="status"></div>
                                <p class="mb-0">Carregando administradores...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script>
    <script src="../js/admin/lista_admin.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(['Administrador']);
        }
    </script>
</body>
</html>
