<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Editar Administrador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/novo_exemplo.css">
    <style>
        .form-error { color: #dc3545; font-size: 0.85rem; display: none; margin-top: 4px; margin-left: 10px; }
        .form-error.show { display: block; }
        .alert { display: none; margin-top: 20px; border-radius: 12px; }
        .alert.show { display: block; }
    </style>
</head>
<body class="bg-white">

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
        <div class="form-card w-100 p-4 p-md-5">
            
            <div class="d-flex justify-content-between align-items-start mb-4 pb-3 border-bottom border-light-subtle">
                <div>
                    <h1 class="h3 fw-bold text-dark mb-1">Editar Administrador</h1>
                    <p class="text-muted small mb-0">Atualize os dados e valide as alterações abaixo.</p>
                </div>
                <a href="lista_administrador.html" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>

            <form id="form-alterar-admin">
                <input type="hidden" id="id_usuario">

                <div class="mb-3">
                    <div class="form-floating">
                        <input type="text" class="form-control rounded-4 custom-input" id="nome" placeholder="Nome completo" required>
                        <label for="nome"><i class="bi bi-person me-2"></i>Nome Completo *</label>
                    </div>
                    <span class="form-error" id="erroNome"></span>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="email" class="form-control rounded-4 custom-input" id="email" placeholder="Email" required>
                            <label for="email"><i class="bi bi-envelope me-2"></i>Email *</label>
                        </div>
                        <span class="form-error" id="erroEmail"></span>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-4 custom-input" id="cpf" placeholder="CPF" required maxlength="14">
                            <label for="cpf"><i class="bi bi-card-text me-2"></i>CPF *</label>
                        </div>
                        <span class="form-error" id="erroCpf"></span>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="date" class="form-control rounded-4 custom-input" id="data_nascimento" required>
                            <label for="data_nascimento"><i class="bi bi-calendar-event me-2"></i>Data de Nascimento *</label>
                        </div>
                        <span class="form-error" id="erroData"></span>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="password" class="form-control rounded-4 custom-input" id="senha" placeholder="Nova Senha">
                            <label for="senha"><i class="bi bi-lock me-2"></i>Nova Senha (opcional)</label>
                        </div>
                        <small class="text-muted ms-2" style="font-size: 0.75rem;">Mínimo 6 caracteres caso queira alterar.</small>
                    </div>
                </div>

                <div class="form-check form-switch mb-4 ms-1">
                    <input class="form-check-input custom-switch" type="checkbox" role="switch" id="status_adm">
                    <label class="form-check-label text-dark fw-medium small" for="status_adm">Administrador Ativo</label>
                </div>

                <div id="divErro" class="alert alert-danger p-3"></div>
                <div id="divSucesso" class="alert alert-success p-3"></div>

                <div class="mt-4">
                    <button type="submit" id="btnEnviar" class="btn btn-warning w-100 rounded-pill fw-bold shadow-sm py-3 text-dark">
                        <i class="bi bi-save me-2"></i> Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/admin/admin_alterar.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script>
        validarAcesso('Administrador');
    </script>
</body>
</html>
