<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Minhas Atividades</title>

    <!-- Fontes e Frameworks -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/atividades_paciente.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar - Seguindo o padrão do seu projeto -->
        <aside class="sidebar">
            <div class="brand-container">
                <img src="../css/logo-lumind.png" alt="Lumind" class="logo">
            </div>
            <nav class="nav-menu">
                <a href="tela_pessoa_tea.html"><i class="bi bi-house-door"></i> Início</a>
                <a href="#" class="active"><i class="bi bi-clipboard-check"></i> Atividades</a>
                <a href="#"><i class="bi bi-bar-chart"></i> Progresso</a>
                <hr>
                <a href="#" id="logoff" class="text-danger"><i class="bi bi-box-arrow-right"></i> Sair</a>
            </nav>
        </aside>

        <!-- Painel Principal -->
        <main class="main-panel flex-grow-1">
            <header class="topbar d-flex justify-content-between align-items-center p-4">
                <div class="d-flex align-items-center">
                    <a href="tela_pessoa_tea.html" class="btn-back">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h2>MINHAS ATIVIDADES</h2>
                </div>
                <div class="user-profile d-flex align-items-center">
                    <div class="d-flex flex-column text-end me-3">
                <span class="user-name me-3">PERFIL</span>
                    <small style="font-size: 0.75rem; color: #1a7091;">Nome do paciente</small>
                </div>
            </header>

            <section class="content p-4">
                <!-- Barra de Busca -->
                <div class="search-container mb-4 d-flex justify-content-end">
                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input type="search" id="inputBusca" placeholder="Buscar atividade">
                    </div>
                </div>

                <!-- Container para os cards dinâmicos -->
                <div id="lista-atividades" class="row g-4">
                    <!-- O JavaScript vai injetar os cards aqui -->
                    <p class="text-center">Buscando suas tarefas...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts de validação e lógica -->
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/atividade/atividades_paciente.js"></script>
    <script>
        // Garante que apenas PessoaTea e ResponsavelLegal acessem esta área
        if (typeof validarAcesso === "function") {
            validarAcesso(['PessoaTea', 'ResponsavelLegal']);
        }
    </script>
</body>
</html>
