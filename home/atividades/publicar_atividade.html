<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Atividade - Lumind</title>

    <!-- Importações do Bootstrap e Fontes (padrão do seu sistema) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Importação do arquivo de estilos customizado -->
    <link rel="stylesheet" href="../../css/atividades/publicar_atividade.css">
</head>

<body class="bg-light">

    <!-- NAVBAR AZUL PADRÃO (Igual à imagem) -->
    <nav class="navbar py-3 px-4 shadow-sm" style="background-color: #38bdf8;"> <!-- Azul amigável -->
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center text-white">
                <button onclick="window.location.href='../tela_profissional.html'"
                    class="btn btn-link text-white text-decoration-none p-0 me-3">
                    <i class="bi bi-arrow-left fs-4"></i>
                </button>
                <h1 class="page-title fs-4 mb-0 fw-bold">Publicar Atividade</h1>
            </div>

            <div>
                <button onclick="logoff()" class="btn btn-light rounded-pill fw-bold px-4 text-primary shadow-sm">
                    Sair
                </button>
            </div>
        </div>
    </nav>

    <!-- Envolvemos o container do formulário aqui para centralizar sem quebrar a Navbar -->
    <div class="form-wrapper">
        <div class="container mb-5">

            <form id="formPublicarAtividade" class="bg-white p-4 p-md-5 rounded-4 shadow-sm border">
                <!-- Checklist Item 1: Inputs de Texto, Select e Data -->
                <div class="form-group mb-3">
                    <label for="titulo" class="form-label fw-bold">Título da Atividade *</label>
                    <input type="text" id="titulo" name="titulo" class="form-control" required
                        placeholder="Ex: Exercício de Coordenação Motora">
                </div>

                <div class="form-group mb-3">
                    <label for="descricao" class="form-label fw-bold">Descrição *</label>
                    <textarea id="descricao" name="descricao" rows="4" class="form-control" required
                        placeholder="Descreva o passo a passo da atividade..."></textarea>
                </div>

                <div class="form-group mb-3">
                    <label for="categoria" class="form-label fw-bold">Categoria *</label>
                    <select id="categoria" name="categoria" class="form-select" required>
                        <option value="">Selecione uma categoria...</option>
                        <option value="Fonoaudiologia">Fonoaudiologia</option>
                        <option value="Psicologia">Psicologia</option>
                        <option value="Terapia Ocupacional">Terapia Ocupacional</option>
                        <option value="Pedagogia">Pedagogia</option>
                    </select>
                </div>

                <div class="form-group mb-3">
                    <label for="data_publicacao" class="form-label fw-bold">Data de Publicação *</label>
                    <input type="date" id="data_publicacao" name="data_publicacao" class="form-control" required>
                </div>

                <!-- Adição Arquitetural: Upload de material de apoio (PDF/Imagem) -->
                <div class="form-group mb-3">
                    <label for="arquivo" class="form-label fw-bold">Anexar Material de Apoio (Opcional - PDF ou
                        Imagem)</label>
                    <input type="file" id="arquivo" name="arquivo" class="form-control"
                        accept=".pdf, image/jpeg, image/png">
                </div>

                <!-- Checklist Item 2: Componente de Seleção Múltipla -->
                <div class="form-group mb-4">
                    <label class="form-label fw-bold">Selecione os Pacientes (Pessoa TEA) *</label>
                    <!-- Este contêiner será preenchido pelo JavaScript -->
                    <div id="containerPacientes" class="pacientes-lista border rounded p-3 bg-light"
                        style="max-height: 200px; overflow-y: auto;">
                        <span class="text-muted">Carregando pacientes...</span>
                    </div>
                    <div id="erroPacientes" class="text-danger small mt-2" style="display: none;">Você precisa
                        selecionar pelo menos um paciente!</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-pill shadow-sm">Publicar
                    Atividade</button>
            </form>
        </div>

        <!-- Importação do index.js global (contém o logoff) e do script da página -->
        <script src="../../js/index.js"></script>
        <script src="../../js/atividades/publicar_atividade.js"></script>

        <!-- Trava de Segurança no Front-end -->
        <script>
            if (typeof validarAcesso === "function") {
                validarAcesso(['ProfissionalSaude']);
            }
        </script>
</body>

</html>
