<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Consultar Status</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container px-3">
        <div class="login-modal" style="max-width: 500px;">
            <div class="text-center mb-4">
                <h1 class="login-title mb-2">Acompanhar Cadastro</h1>
                <p class="login-subtitle">Insira seus dados para verificar seu status</p>
            </div>

            <form id="form-consulta">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">E-mail Cadastrado</label>
                    <input type="email" id="email" class="form-control rounded-3" required>
                    <span class="text-danger small d-none" id="erroEmail">E-mail inválido</span>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">CPF (somente números)</label>
                    <input type="text" id="cpf" maxlength="11" class="form-control rounded-3" required>
                    <span class="text-danger small d-none" id="erroCpf">CPF deve ter 11 números</span>
                </div>

                <button type="submit" id="btn-consultar" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm">
                    Verificar Status
                </button>
            </form>

            <div id="resultado-status" class="mt-4 d-none">
                <hr>
                <div class="p-3 rounded-4 border text-center" id="card-status">
                    <h5 class="fw-bold mb-1" id="status-texto">Status</h5>
                    <p class="small mb-0" id="motivo-texto"></p>
                </div>
                
                <div id="btn-login-container" class="mt-3 d-none text-center">
                    <a href="../login/index.html" class="btn btn-outline-success rounded-pill px-4 fw-bold">Ir para Login</a>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="../login/index.html" class="text-decoration-none small text-success fw-bold">Voltar</a>
            </div>
        </div>
    </div>

    <script src="../js/profissional/profissional_status.js"></script>
</body>
</html>
