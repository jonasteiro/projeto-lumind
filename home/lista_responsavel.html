<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Gestão de Responsáveis</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/tela_administrador.css">
    <link rel="stylesheet" href="../css/responsavel/listar-responsavel.css">
</head>
<body style="background: #f8fcff;">
    
    <main class="w-100 min-vh-100 d-flex flex-column">
        
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0">
                
                <div class="d-flex align-items-center">
                    
                    <a href="tela_profissional.html"
                       class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3"
                       style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;"
                       onmouseover="this.style.backgroundColor='#a8d6f5'"
                       onmouseout="this.style.backgroundColor='#bce2f9'">

                        <i class="bi bi-arrow-left fs-4"></i>

                    </a>

                    <h2 class="fs-4 mb-0 fw-bold"
                        style="color: #167ebc; letter-spacing: 0.5px;">

                        RESPONSÁVEIS LEGAIS

                    </h2>

                </div>

                <div class="d-flex align-items-center gap-3">

                    <div class="d-flex align-items-center border-end border-info pe-3">
                        <div class="d-flex justify-content-center align-items-center rounded-circle text-white shadow-sm" style="width: 42px; height: 42px; background: linear-gradient(145deg, #2f91e7 0%, #2a72b6 100%); font-weight: 700; font-size: 1.05rem; margin-right: 12px;" id="sidebarAvatar">
                            --
                        </div>
                        <div class="d-none d-sm-block text-end">
                            <span class="d-block fw-bold" style="color: #1f6389; font-size: 0.95rem; line-height: 1.1;" id="sidebarNome">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;">Profissional / Admin</small>
                        </div>
                    </div>

                    <a href="#"
                       id="logoff"
                       class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm"
                       style="transition: all 0.2s;">

                        <i class="bi bi-box-arrow-right me-2 fs-5"></i>

                        SAIR

                    </a>

                </div>
                
            </div>

        </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">

            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-light-subtle">

                <div>
                    <h2 class="h4 mb-1 fw-bold text-dark">
                        Responsáveis Cadastrados
                    </h2>

                    <p class="text-muted small mb-0">
                        Gerencie os tutores e responsáveis pelos pacientes.
                    </p>
                </div>

                <button id="btnNovoResponsavel"
                        class="btn btn-primary rounded-pill fw-semibold shadow-sm px-4 d-flex align-items-center gap-2"
                        onclick="window.location.href='cadastro_responsavel.html'">

                    <i class="bi bi-plus-lg"></i>

                    Novo Responsável

                </button>

            </div>

            <div class="table-responsive bg-white rounded-4 shadow-sm border border-light-subtle p-2">
                <div id="lista" class="w-100 pt-2 table-responsive">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p class="mt-2 text-muted">Buscando responsáveis no sistema...</p>
                    </div>
                </div>
            </div>

        </section>
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script>
    <script src="../js/responsavel/lista_responsavel.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(['ProfissionalSaude', 'Administrador']); 
        }
    </script>
</body>
</html>
