<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Profissional - Lumind</title>
    <link rel="stylesheet" href="../css/cadastro_profissional.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>Cadastro de Profissional de Saúde</h1>
                <p class="subtitle">Registrar novo profissional (psicólogo, terapeuta, etc)</p>
            </div>
            <button class="btn-voltar" onclick="voltarPerfis()">← Voltar</button>
        </header>

        <main class="form-container">
            <form id="formCadastroProfissional" class="formulario-prof">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input 
                        type="text" 
                        id="nome" 
                        name="nome" 
                        placeholder="Digite o nome completo" 
                        required
                        maxlength="100"
                    >
                    <span class="form-error" id="erroNome"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="exemplo@email.com" 
                            required
                            maxlength="100"
                        >
                        <span class="form-error" id="erroEmail"></span>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone *</label>
                        <input 
                            type="tel" 
                            id="telefone" 
                            name="telefone" 
                            placeholder="(11) 99999-9999" 
                            required
                            maxlength="20"
                        >
                        <span class="form-error" id="erroTelefone"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="data_nascimento">Data de Nascimento *</label>
                        <input 
                            type="date" 
                            id="data_nascimento" 
                            name="data_nascimento" 
                            required
                        >
                        <span class="form-error" id="erroData"></span>
                    </div>

                    <div class="form-group">
                        <label for="especialidade">Especialidade *</label>
                        <select id="especialidade" name="especialidade" required>
                            <option value="">Selecione uma especialidade</option>
                            <option value="psicologia">Psicologia</option>
                            <option value="fonoaudiologia">Fonoaudiologia</option>
                            <option value="terapia_ocupacional">Terapia Ocupacional</option>
                            <option value="fisioterapia">Fisioterapia</option>
                            <option value="pediatria">Pediatria</option>
                            <option value="psiquiatria">Psiquiatria</option>
                            <option value="outra">Outra</option>
                        </select>
                        <span class="form-error" id="erroEspecialidade"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="registro_profissional">Registro Profissional (CRP/CREFITO/etc) *</label>
                    <input 
                        type="text" 
                        id="registro_profissional" 
                        name="registro_profissional" 
                        placeholder="Ex: CRP 06/XXXXX" 
                        required
                        maxlength="50"
                    >
                    <span class="form-error" id="erroRegistro"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="senha">Senha *</label>
                        <input 
                            type="password" 
                            id="senha" 
                            name="senha" 
                            placeholder="Digite uma senha segura" 
                            required
                            minlength="6"
                        >
                        <span class="form-error" id="erroSenha"></span>
                        <small class="form-hint">Mínimo 6 caracteres</small>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input 
                            type="checkbox" 
                            id="ativo" 
                            name="ativo" 
                            checked
                        >
                        <span>Ativar profissional imediatamente</span>
                    </label>
                </div>

                <div id="divErro" class="alert alert-error"></div>
                <div id="divSucesso" class="alert alert-success"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <span>💾</span> Cadastrar Profissional
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                        <span>🔄</span> Limpar
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="../js/cadastro_profissional.js"></script>
</body>
</html>
