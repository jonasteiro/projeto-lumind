<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lumind | Editar Pessoa TEA</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="../css/pessoa_tea/alterar-cadastro.css">
</head>

<body>

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">

        <div class="form-card w-100 p-4 p-md-5">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-start mb-4 pb-3 border-bottom">

                <div>
                    <h1 class="h3 fw-bold mb-1">
                        Editar Pessoa TEA
                    </h1>

                    <p class="text-muted small mb-0">
                        Atualize as informações clínicas e de cadastro.
                    </p>
                </div>

                <a
                    href="lista_pessoa_tea.html"
                    class="btn btn-outline-secondary rounded-pill px-3"
                >
                    <i class="bi bi-arrow-left"></i>
                    Voltar
                </a>

            </div>

            <!-- FORM -->
            <form id="form-alterar-pessoa-tea">

                <input type="hidden" id="id_usuario">

                <!-- NOME -->
                <div class="mb-3">

                    <div class="form-floating">

                        <input
                            type="text"
                            id="nome"
                            class="form-control custom-input rounded-4"
                            placeholder="Nome completo"
                            required
                        >

                        <label for="nome">
                            <i class="bi bi-person me-2"></i>
                            Nome Completo *
                        </label>

                    </div>

                    <span class="form-error" id="erroNome"></span>

                </div>

                <!-- EMAIL + CPF -->
                <div class="row g-3 mb-3">

                    <div class="col-md-6">

                        <div class="form-floating">

                            <input
                                type="email"
                                id="email"
                                class="form-control custom-input rounded-4"
                                placeholder="Email"
                                required
                            >

                            <label for="email">
                                <i class="bi bi-envelope me-2"></i>
                                Email *
                            </label>

                        </div>

                        <span class="form-error" id="erroEmail"></span>

                    </div>

                    <div class="col-md-6">

                        <div class="form-floating">

                            <input
                                type="text"
                                id="cpf"
                                class="form-control custom-input rounded-4"
                                placeholder="CPF"
                                required
                                maxlength="11"
                            >

                            <label for="cpf">
                                <i class="bi bi-card-text me-2"></i>
                                CPF *
                            </label>

                        </div>

                        <span class="form-error" id="erroCpf"></span>

                    </div>

                </div>

                <!-- DATA + NIVEL -->
                <div class="row g-3 mb-3">

                    <div class="col-md-6">

                        <div class="form-floating">

                            <input
                                type="date"
                                id="data_nascimento"
                                class="form-control custom-input rounded-4"
                                required
                            >

                            <label for="data_nascimento">
                                <i class="bi bi-calendar-event me-2"></i>
                                Data de Nascimento *
                            </label>

                        </div>

                        <span class="form-error" id="erroData"></span>

                    </div>

                    <div class="col-md-6">

                        <div class="form-floating">

                            <select
                                id="nivel_tea"
                                class="form-select custom-input rounded-4"
                                required
                            >

                                <option value="">
                                    Selecione o nível
                                </option>

                                <option value="Nível 1 - Suporte Leve">
                                    Nível 1 - Suporte Leve
                                </option>

                                <option value="Nível 2 - Suporte Moderado">
                                    Nível 2 - Suporte Moderado
                                </option>

                                <option value="Nível 3 - Suporte Substancial">
                                    Nível 3 - Suporte Substancial
                                </option>

                            </select>

                            <label for="nivel_tea">
                                <i class="bi bi-activity me-2"></i>
                                Nível de Suporte *
                            </label>

                        </div>

                        <span class="form-error" id="erroNivel"></span>

                    </div>

                </div>

                <!-- OBSERVAÇÃO -->
                <div class="form-floating mb-3">

                    <textarea
                        id="observacao"
                        class="form-control custom-input rounded-4"
                        placeholder="Observações"
                        style="height: 120px"
                    ></textarea>

                    <label for="observacao">
                        <i class="bi bi-journal-text me-2"></i>
                        Observações Clínicas
                    </label>

                </div>

                <!-- SENHA -->
                <div class="form-floating mb-4">

                    <input
                        type="password"
                        id="senha"
                        class="form-control custom-input rounded-4"
                        placeholder="Nova senha"
                    >

                    <label for="senha">
                        <i class="bi bi-lock me-2"></i>
                        Nova Senha (opcional)
                    </label>

                </div>

                <!-- ALERTAS -->
                <div
                    id="divErro"
                    class="alert alert-danger d-none"
                ></div>

                <div
                    id="divSucesso"
                    class="alert alert-success d-none"
                ></div>

                <!-- BOTÃO -->
                <div class="mt-4">

                    <button
                        type="submit"
                        id="btnEnviar"
                        class="btn btn-primary-neutral w-100 rounded-pill fw-bold py-3"
                    >

                        <i class="bi bi-save me-2"></i>

                        Salvar Alterações

                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="../js/pessoa_tea.js/pessoa_tea_alterar.js"></script>

</body>

</html>
