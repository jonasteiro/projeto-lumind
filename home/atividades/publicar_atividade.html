<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publicar Atividade | Lumind</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="../../css/atividades/publicar_atividade.css" />
</head>

<body style="background: #f8fcff;">

    <main class="w-100 min-vh-100 d-flex flex-column">
        
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0">
                
                <div class="d-flex align-items-center">
                    <a href="../tela_profissional.html" 
                       class="d-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" 
                       style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s; position: relative; z-index: 10; cursor: pointer;" 
                       onmouseover="this.style.backgroundColor='#a8d6f5'" 
                       onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    
                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">PUBLICAR ATIVIDADE</h2>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center border-end border-info pe-3">
                        <div class="d-flex justify-content-center align-items-center rounded-circle text-white shadow-sm" style="width: 42px; height: 42px; background: linear-gradient(145deg, #2f91e7 0%, #2a72b6 100%); font-weight: 700; font-size: 1.05rem; margin-right: 12px;" id="sidebarAvatar">
                            --
                        </div>
                        <div class="d-none d-sm-block text-end">
                            <span class="d-block fw-bold" style="color: #1f6389; font-size: 0.95rem; line-height: 1.1;" id="sidebarNome">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;">Profissional</small>
                        </div>
                    </div>

                    <a href="#" id="logoff" class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm">
                        <i class="bi bi-box-arrow-right me-2 fs-5"></i> SAIR
                    </a>
                </div>
                
            </div>
        </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">
            
            <div class="atividade-card shadow-sm border border-light-subtle rounded-4 bg-white" style="max-width: 800px; margin: 0 auto; overflow: hidden;">
                
                <div class="card-header-activity p-4 bg-light border-bottom d-flex justify-content-between align-items-center">
                    <h3 class="text-primary mb-0 fs-5 fw-bold"><i class="bi bi-journal-plus me-2"></i> Nova Atividade Terapêutica</h3>
                    <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill px-3 py-2">Criação</span>
                </div>

                <div class="card-body-activity p-4">
                    <p class="text-muted mb-4" style="font-size: 0.9rem;">Preencha as informações abaixo para publicar uma nova atividade para seus pacientes.</p>

                    <form id="formPublicarAtividade" method="POST">
                        <div class="form-floating mb-3">
                            <input type="text" id="titulo" name="titulo" class="form-control rounded-3 border-light-subtle" placeholder="Título" required />
                            <label for="titulo" class="text-muted"><i class="bi bi-type me-2"></i> Título da Atividade *</label>
                        </div>

                        <div class="form-floating mb-3">
                            <textarea id="descricao" name="descricao" class="form-control rounded-3 border-light-subtle" placeholder="Descrição" style="height: 140px;" required></textarea>
                            <label for="descricao" class="text-muted"><i class="bi bi-card-text me-2"></i> Descrição *</label>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-floating">
                                    <select id="categoria" name="categoria" class="form-select rounded-3 border-light-subtle" required>
                                        <option value="">Selecione...</option>
                                        <option value="Fonoaudiologia">Fonoaudiologia</option>
                                        <option value="Psicologia">Psicologia</option>
                                        <option value="Terapia Ocupacional">Terapia Ocupacional</option>
                                        <option value="Pedagogia">Pedagogia</option>
                                    </select>
                                    <label for="categoria" class="text-muted"><i class="bi bi-tags me-2"></i> Categoria *</label>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <div class="form-floating">
                                    <input type="date" id="data_publicacao" name="data_publicacao" class="form-control rounded-3 border-light-subtle" placeholder="Data" required />
                                    <label for="data_publicacao" class="text-muted"><i class="bi bi-calendar-event me-2"></i> Data de Publicação *</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4 p-3 border border-light-subtle rounded-3 bg-light">
                            <label for="arquivo" class="d-block mb-2 text-dark fw-bold" style="font-size: 0.9rem;">
                                <i class="bi bi-paperclip me-2"></i> Material de Apoio (Opcional)
                            </label>
                            <input type="file" id="arquivo" name="arquivo" class="form-control border-secondary-subtle" accept=".pdf, image/jpeg, image/png" />
                            <small class="text-muted d-block mt-2" style="font-size: 0.8rem;">Formatos aceitos: PDF, JPG e PNG.</small>
                        </div>

                        <div class="mb-4">
                            <label class="d-block mb-2 text-dark fw-bold" style="font-size: 0.9rem;">
                                <i class="bi bi-people me-2"></i> Selecionar Pacientes *
                            </label>
                            <div id="containerPacientes" class="p-3 border border-light-subtle rounded-3" style="background: #fafcff; min-height: 80px;">
                                <span class="text-muted" style="font-size: 0.9rem;">Carregando pacientes...</span>
                            </div>
                            <div id="erroPacientes" class="alert alert-danger mt-2 d-none py-2" role="alert" style="font-size: 0.85rem;">
                                Você precisa selecionar pelo menos um paciente.
                            </div>
                        </div>
                    </form>
                </div>

                <div class="card-footer-activity p-3 bg-light border-top">
                    <div class="btn-group-card d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-outline-secondary px-4 py-2 fw-semibold rounded-3" onclick="window.location.href='../tela_profissional.html'">Cancelar</button>
                        <button type="submit" form="formPublicarAtividade" class="btn btn-primary px-4 py-2 fw-semibold rounded-3 shadow-sm">
                            <i class="bi bi-send-fill me-1"></i> Publicar Atividade
                        </button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/valida_sessao.js"></script>
    <script src="../../js/index.js"></script>
    
    <script src="../../js/atividade/publicar_atividade.js"></script>
    
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(["ProfissionalSaude"]);
        }
    </script>
</body>
</html>
