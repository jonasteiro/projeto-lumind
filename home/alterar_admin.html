<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Editar Administrador</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/tela_administrador.css">
    <link rel="stylesheet" href="../css/administrador/alterar_admin.css">
</head>
<body style="background: #f8fcff;">
    
    <main class="w-100 min-vh-100 d-flex flex-column">
        
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            <div class="d-flex justify-content-between align-items-center container-xl w-100">
                
                <div class="d-flex align-items-center">
                    <a href="lista_administrador.html" class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;" onmouseover="this.style.backgroundColor='#a8d6f5'" onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">EDITAR ADMINISTRADOR</h2>
                </div>

                <div class="d-flex align-items-center gap-3">
                    
                    <div class="d-flex align-items-center border-end border-info pe-3">
                        <div class="d-flex justify-content-center align-items-center rounded-circle text-white shadow-sm" style="width: 42px; height: 42px; background: linear-gradient(145deg, #2f91e7 0%, #2a72b6 100%); font-weight: 700; font-size: 1.05rem; margin-right: 12px;" id="sidebarAvatar">
                            --
                        </div>
                        <div class="d-none d-sm-block text-end">
                            <span class="d-block fw-bold" style="color: #1f6389; font-size: 0.95rem; line-height: 1.1;" id="sidebarNome">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;" id="cargo-sessao">Administrador</small>
                        </div>
                    </div>

                    <a href="#" id="logoff" class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm">
                        <i class="bi bi-box-arrow-right me-2 fs-5"></i> SAIR
                    </a>
                </div>
                
            </div>
        </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">
            
            <div class="atividade-card shadow-sm" style="max-width: 800px; margin: 0 auto;">
                
                <div class="card-header-activity bg-light">
                    <h3 class="text-primary"><i class="bi bi-person-lines-fill me-2"></i> Atualização de Dados</h3>
                    <span class="card-category">Edição</span>
                </div>

                <div class="card-body-activity p-4">
                    <p class="text-muted mb-4" style="font-size: 0.9rem;">Atualize as informações do administrador e valide as alterações abaixo.</p>

                    <form id="form-alterar-admin">
                        <input type="hidden" id="id_usuario">

                        <div class="mb-3">
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-3 border-light-subtle" id="nome" placeholder="Nome completo" required>
                                <label for="nome" class="text-muted"><i class="bi bi-person me-2"></i>Nome Completo *</label>
                            </div>
                            <span class="text-danger small" id="erroNome"></span>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" class="form-control rounded-3 border-light-subtle" id="email" placeholder="Email" required>
                                    <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>Email *</label>
                                </div>
                                <span class="text-danger small" id="erroEmail"></span>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control rounded-3 border-light-subtle" id="cpf" placeholder="CPF" required maxlength="14">
                                    <label for="cpf" class="text-muted"><i class="bi bi-card-text me-2"></i>CPF *</label>
                                </div>
                                <span class="text-danger small" id="erroCpf"></span>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="date" class="form-control rounded-3 border-light-subtle" id="data_nascimento" required>
                                    <label for="data_nascimento" class="text-muted"><i class="bi bi-calendar-event me-2"></i>Data de Nascimento *</label>
                                </div>
                                <span class="text-danger small" id="erroData"></span>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="password" class="form-control rounded-3 border-light-subtle" id="senha" placeholder="Nova Senha" minlength="8">
                                    <label for="senha" class="text-muted"><i class="bi bi-lock me-2"></i>Nova Senha (opcional)</label>
                                </div>
                                <small class="text-muted ms-2" style="font-size: 0.75rem;">Mín. 8 caracteres, letras, números e símbolos.</small>
                                <span class="text-danger small d-block" id="erroSenha"></span>
                            </div>
                        </div>

                        <div class="form-check form-switch mb-4 ms-1 mt-3">
                            <input class="form-check-input border-secondary" type="checkbox" role="switch" id="status_adm">
                            <label class="form-check-label text-dark fw-medium" style="font-size: 0.9rem;" for="status_adm">Administrador Ativo</label>
                        </div>

                        <div id="divErro" class="alert alert-danger d-none py-2" style="font-size: 0.85rem;"></div>
                        <div id="divSucesso" class="alert alert-success d-none py-2" style="font-size: 0.85rem;"></div>
                    </form>
                </div>

                <div class="card-footer-activity p-3 bg-light border-top">
                    <div class="btn-group-card d-flex justify-content-end gap-2">
                        <a href="lista_administrador.html" class="btn btn-outline-secondary px-4 py-2 fw-semibold rounded-3">Cancelar</a>
                        <button type="submit" form="form-alterar-admin" id="btnEnviar" class="btn btn-primary px-4 py-2 fw-semibold rounded-3 shadow-sm">
                            <i class="bi bi-save me-1"></i> Salvar Alterações
                        </button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/admin/admin_alterar.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(['Administrador']);
        }
    </script>
</body>
</html>
