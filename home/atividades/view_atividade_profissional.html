<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Avaliação de Atividade</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../../css/atividades/tela_atividade.css">

    <style>
        /* Ajustes de layout para tela sem sidebar */
        body { background: #f8fcff; }
        .main-panel-full { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    
    <div class="main-panel-full">
        
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0">
                
                <div class="d-flex align-items-center">
                    <a href="../atividades_painel.html" class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;" onmouseover="this.style.backgroundColor='#a8d6f5'" onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">AVALIAR ATIVIDADE</h2>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center border-end border-info pe-3">
                        <div class="d-flex justify-content-center align-items-center rounded-circle text-white shadow-sm" style="width: 42px; height: 42px; background: linear-gradient(145deg, #2f91e7 0%, #2a72b6 100%); font-weight: 700; font-size: 1.05rem; margin-right: 12px;" id="sidebarAvatar">
                            --
                        </div>
                        <div class="d-none d-sm-block text-end">
                            <span class="d-block fw-bold" style="color: #1f6389; font-size: 0.95rem; line-height: 1.1;" id="nome-usuario">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;">Profissional de Saúde</small>
                        </div>
                    </div>

                    <a href="#" id="logoff" class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm">
                        <i class="bi bi-box-arrow-right me-2 fs-5"></i> SAIR
                    </a>
                </div>
            </div>
        </header>

        <main class="content p-4 container-xl flex-grow-1 mt-3">
            <div class="mx-auto" style="max-width: 800px;">
                
                <div class="activity-card bg-white p-4 p-md-5 rounded-4 shadow-sm border border-light-subtle mb-4">
                    
                    <h3 id="titulo-atividade" class="fw-bold text-dark mb-3">Carregando...</h3>
                    
                    <div class="activity-header d-flex align-items-center mb-3">
                        <span class="badge-categoria me-2" id="categoria-atividade">Categoria</span>
                        <span class="activity-meta text-muted small" id="data-atividade"><i class="bi bi-calendar-check me-1"></i> Data</span>
                    </div>
                    
                    <hr class="divider my-4 border-light-subtle">
                    
                    <div>
                        <p class="section-label text-primary fw-semibold mb-2"><i class="bi bi-file-text me-2"></i> Descrição</p>
                        <div class="activity-description text-secondary" id="descricao-atividade">Carregando...</div>
                    </div>

                    <hr class="divider my-4 border-light-subtle">

                    <div id="container-anexo" style="display: none;">
                        <p class="section-label text-primary fw-semibold mb-3"><i class="bi bi-paperclip me-2"></i> Anexo da Atividade</p>
                        <div id="anexo-content" class="mb-3 text-center"></div>
                        <hr class="divider my-4 border-light-subtle">
                    </div>

                    <div>
                        <p class="section-label text-primary fw-semibold mb-3"><i class="bi bi-checklist me-2"></i> Submissões dos Pacientes</p>
                        <div id="submissoes-list" class="submissoes-container">
                            <div class="text-center py-4">
                                <div class="spinner-border text-primary mb-2" role="status"></div>
                                <p class="text-muted">Carregando submissões...</p>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom bg-light">
                    <h5 class="modal-title fw-bold text-primary"><i class="bi bi-chat-square-text me-2"></i>Dar Feedback para <span id="modal-patient-name" class="text-dark"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="feedbackForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted small text-uppercase">Feedback Profissional</label>
                            <textarea class="form-control rounded-3 bg-light p-3" id="feedbackText" name="feedback" rows="6" placeholder="Escreva seu feedback detalhado sobre o desempenho do paciente nesta atividade..." maxlength="1000" style="resize: vertical;" required></textarea>
                            <div class="d-flex justify-content-end mt-2">
                                <small class="text-muted bg-white border rounded-pill px-3 py-1 shadow-sm" id="charCount" style="font-size: 0.8rem; font-weight: 500;">0/1000</small>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light border-top">
                    <button type="button" class="btn btn-outline-secondary fw-semibold rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary fw-bold rounded-pill px-4 shadow-sm" id="submitFeedback">
                        <i class="bi bi-check-lg me-1"></i> Enviar Feedback
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/valida_sessao.js"></script>
    <script src="../../js/index.js"></script>
    <script src="../../js/atividade/view_atividade_profissional.js"></script>
    <script>
        // Restringe o acesso apenas para o profissional
        if (typeof validarAcesso === "function") {
            validarAcesso(['ProfissionalSaude']);
        }
    </script>
</body>
</html>
