<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Conecte-se</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container px-3">
        <div class="login-modal">
            
            <div class="text-center mb-5">
                <h1 class="login-title mb-3">Seja bem-vindo!</h1>
            </div>

            <div id="erro-login" class="alert alert-danger d-none" style="font-size: 0.9rem;" role="alert"></div>

            <form id="form-login">
                <div class="form-floating mb-4">
                    <input type="text" class="form-control rounded-4 login-input" id="usuario" placeholder="usuario" required>
                    <label for="usuario" class="text-muted"><i class="bi bi-person me-2"></i>Usuário</label>
                </div>

                <div class="form-floating mb-5 position-relative">
                    <input type="password" class="form-control rounded-4 login-input" id="senha" placeholder="senha" required>
                    <label for="senha" class="text-muted"><i class="bi bi-lock me-2"></i>Senha</label>
                    <span class="position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer text-muted" id="togglePassword">
                        <i class="bi bi-eye-slash" id="eyeIcon"></i>
                    </span>
                </div>

                <div>
                    <button type="submit" id="enviar" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm btn-login">
                        <span id="btn-text">Entrar</span>
                        <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                </div>
            </form>
            
        </div>
    </div>

    <script src="../js/cliente_login.js"></script>
</body>
</html>
