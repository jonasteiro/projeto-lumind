<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Publicar Atividade | Lumind</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    />

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- CSS ORIGINAL -->
    <link
        rel="stylesheet"
        href="../../css/atividades/publicar_atividade.css"
    />
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <div class="login-container px-3">

        <div class="login-modal">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <button
                    class="btn btn-outline-success rounded-pill px-3"
                    type="button"
                    onclick="window.location.href='../tela_profissional.html'"
                >
                    <i class="bi bi-arrow-left"></i>
                </button>

                <button
                    onclick="logoff()"
                    class="btn btn-outline-success rounded-pill px-4 fw-bold"
                    type="button"
                >
                    Sair
                </button>

            </div>

            <!-- TITLE -->
            <div class="text-center mb-5">

                <h1 class="login-title mb-3">
                    <i class="bi bi-journal-plus me-2"></i>
                    Publicar Atividade
                </h1>

                <p class="login-subtitle">
                    Preencha as informações para publicar uma nova atividade terapêutica.
                </p>

            </div>

            <!-- FORM -->
            <form id="formPublicarAtividade">

                <!-- TÍTULO -->
                <div class="form-floating mb-4">

                    <input
                        type="text"
                        id="titulo"
                        name="titulo"
                        class="form-control rounded-4 login-input"
                        placeholder="Título"
                        required
                    />

                    <label for="titulo">
                        <i class="bi bi-type me-2"></i>
                        Título da Atividade
                    </label>

                </div>

                <!-- DESCRIÇÃO -->
                <div class="form-floating mb-4">

                    <textarea
                        id="descricao"
                        name="descricao"
                        class="form-control rounded-4 login-input"
                        placeholder="Descrição"
                        style="height: 140px;"
                        required
                    ></textarea>

                    <label for="descricao">
                        <i class="bi bi-card-text me-2"></i>
                        Descrição
                    </label>

                </div>

                <!-- CATEGORIA -->
                <div class="form-floating mb-4">

                    <select
                        id="categoria"
                        name="categoria"
                        class="form-select rounded-4 login-input"
                        required
                    >

                        <option value="">Selecione...</option>

                        <option value="Fonoaudiologia">
                            Fonoaudiologia
                        </option>

                        <option value="Psicologia">
                            Psicologia
                        </option>

                        <option value="Terapia Ocupacional">
                            Terapia Ocupacional
                        </option>

                        <option value="Pedagogia">
                            Pedagogia
                        </option>

                    </select>

                    <label for="categoria">
                        <i class="bi bi-tags me-2"></i>
                        Categoria
                    </label>

                </div>

                <!-- DATA -->
                <div class="form-floating mb-4">

                    <input
                        type="date"
                        id="data_publicacao"
                        name="data_publicacao"
                        class="form-control rounded-4 login-input"
                        placeholder="Data"
                        required
                    />

                    <label for="data_publicacao">
                        <i class="bi bi-calendar-event me-2"></i>
                        Data de Publicação
                    </label>

                </div>

                <!-- ARQUIVO -->
                <div class="mb-4">

                    <label
                        for="arquivo"
                        class="d-block mb-2 text-muted fw-semibold"
                    >
                        <i class="bi bi-paperclip me-2"></i>
                        Material de Apoio
                    </label>

                    <input
                        type="file"
                        id="arquivo"
                        name="arquivo"
                        class="form-control rounded-4 login-input"
                        accept=".pdf, image/jpeg, image/png"
                    />

                    <small class="text-muted d-block mt-2">
                        Formatos aceitos: PDF, JPG e PNG.
                    </small>

                </div>

                <!-- PACIENTES -->
                <div class="mb-5">

                    <label class="d-block mb-3 text-muted fw-semibold">
                        <i class="bi bi-people me-2"></i>
                        Selecionar Pacientes
                    </label>

                    <div
                        id="containerPacientes"
                        class="p-4 rounded-4 login-input"
                    >
                        <span class="text-muted">
                            Carregando pacientes...
                        </span>
                    </div>

                    <div
                        id="erroPacientes"
                        class="alert alert-danger mt-3 d-none"
                        role="alert"
                    >
                        Você precisa selecionar pelo menos um paciente.
                    </div>

                </div>

                <!-- SUBMIT -->
                <button
                    type="submit"
                    class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm btn-login"
                >

                    <i class="bi bi-send-fill me-2"></i>

                    Publicar Atividade

                </button>

            </form>

        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="../../js/index.js"></script>

    <script src="../../js/atividades/publicar_atividade.js"></script>

    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(["ProfissionalSaude"]);
        }
    </script>

</body>
</html>
