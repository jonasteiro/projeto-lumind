<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Gestão de Aprovações</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/tela_administrador.css">
    <link rel="stylesheet" href="../css/administrador/decisao-admin.css">
</head>
<body style="background: #f8fcff;">

    <main class="w-100 min-vh-100 d-flex flex-column">
        
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0">
                
                <div class="d-flex align-items-center">
                    <a href="/projeto-lumind/home/tela_administrador.html" class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s; position: relative; z-index: 10; cursor: pointer;" onmouseover="this.style.backgroundColor='#a8d6f5'" onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">GESTÃO DE APROVAÇÕES</h2>
                </div>

                <a href="#" id="logoff" class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm" style="transition: all 0.2s;">
                    <i class="bi bi-box-arrow-right me-2 fs-5"></i> SAIR
                </a>
                
            </div>
        </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-light-subtle">
                <div>
                    <h2 class="h4 mb-1 fw-bold text-dark">Solicitações de Profissionais</h2>
                    <p class="text-muted small mb-0">Revise os documentos enviados e aprove ou reprove o acesso ao sistema.</p>
                </div>
                <span class="badge badge-aguardando px-3 py-2 fs-6 shadow-sm" id="contador-pendentes">Carregando...</span>
            </div>

            <div id="alerta-global" class="alert d-none" role="alert"></div>

            <div class="table-responsive bg-white rounded-4 shadow-sm border border-light-subtle p-2">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="py-3 ps-3">Profissional</th>
                            <th class="py-3">Registro / Especialidade</th>
                            <th class="py-3 text-center">Documentos</th>
                            <th class="py-3 text-end pe-3">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pendentes">
                        <tr>
                            <td colspan="4" class="text-center py-5 text-muted">
                                <div class="spinner-border text-primary mb-2" role="status"></div>
                                <p class="mb-0">Carregando solicitações...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </section>
    </main>

    <div class="modal fade" id="modalReprovar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Motivo da Reprovação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <textarea id="motivo-texto" class="form-control bg-light" rows="4" placeholder="Descreva o motivo claro para o profissional..."></textarea>
                    <input type="hidden" id="reprovar-id-usuario">
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger px-4" id="btn-confirmar-reprovar">Confirmar Reprovação</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPreview" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-bottom-0">
                    <h5 class="modal-title fw-bold" id="titulo-preview">Visualizar Documento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="conteudo-preview" class="text-center bg-light">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script>
    <script src="../js/admin/admin_aprovacoes.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof validarAcesso === "function") {
                validarAcesso(['Administrador']);
            }
        });
    </script>
</body>
</html>
