<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Meus Relatórios</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/tela_responsavel.css">
</head>
<body>
    <div class="tela-responsavel">
        <aside class="sidebar">
            <div class="brand-container text-center py-4 border-bottom border-info border-opacity-25">
                <img src="../css/logo-lumind.png" alt="Lumind" class="img-fluid" style="width: 120px; height: auto;" onerror="this.style.display='none'">
            </div>

            <div class="member-list p-3 border-bottom border-info border-opacity-25">
                <div class="member-item d-flex align-items-center mb-3 gap-3">
                    <div class="d-flex justify-content-center align-items-center rounded-circle text-white flex-shrink-0"
                         style="width: 46px; height: 46px; background: linear-gradient(145deg, #9cd1ff 10%, #0c8fd6 90%); font-weight: 700; font-size: 1.05rem;"
                         id="sidebarAvatar">
                        --
                    </div>
                    <div>
                        <strong id="sidebarNome" style="font-size: 0.95rem; color: #1f6389;"></strong>
                        <small class="d-block text-muted">Responsável</small>
                    </div>
                </div>
                <div id="lista-dependentes-sidebar"></div>
            </div>
            
            <nav class="nav flex-column p-3">
                <a href="tela_responsavel.html" class="nav-link"><i class="bi bi-house-door-fill"></i> INICIAL</a>
                <a href="atividades_responsavel.html" class="nav-link"><i class="bi bi-clipboard-check"></i> ATIVIDADES</a>
                <a href="#" class="nav-link active"><i class="bi bi-journal-text"></i> RELATÓRIOS</a>
                
            </nav>
            <div class="sidebar-footer text-center p-3 mt-auto">
                <small>Versão 1.0</small>
            </div>
        </aside>

        <main class="main-panel">
            <header class="topbar d-flex justify-content-between align-items-center p-4">
                <div class="d-flex align-items-center">
                    <a href="tela_responsavel.html" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
                    <h2>MEUS RELATÓRIOS</h2>
                </div>
                <a href="relatorio_responsavel.html" class="btn btn-primary rounded-pill px-4">
                    <i class="bi bi-plus-lg me-1"></i> NOVO RELATÓRIO
                </a>
            </header>

            <section class="content p-4">
                <div id="lista-relatorios" class="row g-4">
                    <p class="text-center text-muted">Buscando relatórios...</p>
                </div>
            </section>
        </main>
    </div>

    <div class="modal fade" id="modalRelatorio" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content shadow border-0">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold text-primary">Detalhes do Relatório</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="text-muted small text-uppercase fw-bold">Data de Envio</label>
                        <p id="modal-data" class="fw-bold fs-6"></p>
                    </div>
                    <div class="mb-0">
                        <label class="text-muted small text-uppercase fw-bold">Descrição Completa</label>
                        <div id="modal-descricao" class="p-3 bg-light rounded border border-light-subtle" 
                             style="white-space: pre-wrap; word-wrap: break-word; min-height: 150px; max-height: 400px; overflow-y: auto;">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/responsavel/lista_relatorios.js"></script>
</body>
</html>
