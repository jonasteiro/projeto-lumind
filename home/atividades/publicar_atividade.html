<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Publicar Atividade | Lumind</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../../css/atividades/publicar_atividade.css" />
  </head>

  <body>
    <!-- =========================================================
         HEADER
    ========================================================== -->

    <header class="topbar">
      <div class="topbar-content">
        <div class="topbar-left">
          <button
            class="back-button"
            type="button"
            onclick="window.location.href = '../tela_profissional.html'"
            aria-label="Voltar"
          >
            <i class="bi bi-arrow-left"></i>
          </button>

          <h1 class="page-title">Publicar Atividade</h1>
        </div>

        <button onclick="logoff()" class="logout-button" type="button">
          Sair
        </button>
      </div>
    </header>

    <!-- =========================================================
         MAIN
    ========================================================== -->

    <main class="page-layout">
      <section class="activity-card">
        <header class="card-header">
          <h2 class="card-title">Nova Atividade</h2>

          <p class="card-subtitle">
            Preencha as informações para publicar uma nova atividade
            terapêutica.
          </p>
        </header>

        <!-- =========================================================
                 FORM
            ========================================================== -->

        <form id="formPublicarAtividade" class="activity-form">
          <!-- Título -->
          <div class="field-group">
            <label for="titulo" class="field-label">
              Título da Atividade *
            </label>

            <input
              type="text"
              id="titulo"
              name="titulo"
              class="field-input"
              placeholder="Ex: Exercício de Coordenação Motora"
              required
            />
          </div>

          <!-- Descrição -->
          <div class="field-group">
            <label for="descricao" class="field-label"> Descrição * </label>

            <textarea
              id="descricao"
              name="descricao"
              class="field-input field-textarea"
              rows="5"
              placeholder="Descreva o passo a passo da atividade..."
              required
            ></textarea>
          </div>

          <!-- Categoria -->
          <div class="field-group">
            <label for="categoria" class="field-label"> Categoria * </label>

            <select
              id="categoria"
              name="categoria"
              class="field-input"
              required
            >
              <option value="">Selecione uma categoria...</option>

              <option value="Fonoaudiologia">Fonoaudiologia</option>

              <option value="Psicologia">Psicologia</option>

              <option value="Terapia Ocupacional">Terapia Ocupacional</option>

              <option value="Pedagogia">Pedagogia</option>
            </select>
          </div>

          <!-- Data -->
          <div class="field-group">
            <label for="data_publicacao" class="field-label">
              Data de Publicação *
            </label>

            <input
              type="date"
              id="data_publicacao"
              name="data_publicacao"
              class="field-input"
              required
            />
          </div>

          <!-- Arquivo -->
          <div class="field-group">
            <label for="arquivo" class="field-label"> Material de Apoio </label>

            <input
              type="file"
              id="arquivo"
              name="arquivo"
              class="field-input"
              accept=".pdf, image/jpeg, image/png"
            />

            <small class="field-helper">
              Formatos aceitos: PDF, JPG e PNG.
            </small>
          </div>

          <!-- Pacientes -->
          <div class="field-group">
            <label class="field-label"> Selecionar Pacientes * </label>

            <div id="containerPacientes" class="patients-container">
              <span class="patients-loading"> Carregando pacientes... </span>
            </div>

            <span id="erroPacientes" class="error-message">
              Você precisa selecionar pelo menos um paciente.
            </span>
          </div>

          <!-- Submit -->
          <button type="submit" class="submit-button">
            <i class="bi bi-send-fill"></i>
            Publicar Atividade
          </button>
        </form>
      </section>
    </main>

    <!-- =========================================================
         SCRIPTS
    ========================================================== -->

    <script src="../../js/index.js"></script>
    <script src="../../js/atividades/publicar_atividade.js"></script>

    <script>
      if (typeof validarAcesso === "function") {
        validarAcesso(["ProfissionalSaude"]);
      }
    </script>
  </body>
</html>
