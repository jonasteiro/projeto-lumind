<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Gestão</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/listar_exemplo.css">
</head>
<body class="bg-white">

    <nav class="navbar navbar-custom py-3 px-4 mb-5">
        <div class="container-xl d-flex justify-content-between align-items-center">
            
            <div>
                <h1 class="page-title fs-4 mb-0"><i class="bi bi-box-seam me-2"></i>Dashboard</h1>
            </div>

            <div>
                <button id="logoff" class="btn btn-outline-secondary btn-sm rounded-pill fw-semibold px-4 d-flex align-items-center gap-2">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </button>
            </div>

        </div>
    </nav>

    <main class="container-xl mb-5">
        
        <div class="content-area p-4 p-md-5 w-100">
            
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-light-subtle">
                <div>
                    <h2 class="h4 mb-1 fw-bold text-dark">Registros do Sistema</h2>
                    <p class="text-muted small mb-0">Gerencie seus dados e listagens abaixo.</p>
                    <p>Oi</p>   
                </div>
                
                <button id="novo" class="btn btn-primary-neutral rounded-pill fw-semibold shadow-sm px-4 d-flex align-items-center gap-2">
                    <i class="bi bi-plus-lg"></i> Novo Registro
                </button>
            </div>

            <div id="lista" class="w-100 pt-2 table-responsive">
                </div>

        </div>

    </main>

    <script src="../js/index.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
