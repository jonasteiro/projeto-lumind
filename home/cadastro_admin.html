<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Administrador - Lumind</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>Cadastro de Administrador</h1>
                <p class="subtitle">Criar novo perfil de administrador do sistema</p>
            </div>
            <button class="btn-voltar" onclick="voltarPerfis()">← Voltar</button>
        </header>

        <main class="form-container">
            <form id="formCadastroAdm" class="formulario-adm">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input 
                        type="text" 
                        id="nome" 
                        name="nome" 
                        placeholder="Digite o nome completo" 
                        required
                        maxlength="100"
                    >
                    <span class="form-error" id="erroNome"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="exemplo@email.com" 
                            required
                            maxlength="100"
                        >
                        <span class="form-error" id="erroEmail"></span>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF *</label>
                        <input 
                            type="text" 
                            id="cpf" 
                            name="cpf" 
                            placeholder="Apenas números" 
                            required
                            maxlength="14"
                        >
                        <span class="form-error" id="erroCpf"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="data_nascimento">Data de Nascimento *</label>
                        <input 
                            type="date" 
                            id="data_nascimento" 
                            name="data_nascimento" 
                            required
                        >
                        <span class="form-error" id="erroData"></span>
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha *</label>
                        <input 
                            type="password" 
                            id="senha" 
                            name="senha" 
                            placeholder="Digite uma senha segura" 
                            required
                            minlength="6"
                        >
                        <span class="form-error" id="erroSenha"></span>
                        <small class="form-hint">Mínimo 6 caracteres</small>
                    </div>
                </div>

                <div id="divErro" class="alert alert-error"></div>
                <div id="divSucesso" class="alert alert-success"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <span>💾</span> Criar Administrador
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                        <span>🔄</span> Limpar
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="../js/admin/admin_novo.js"></script>
</body>
</html>
