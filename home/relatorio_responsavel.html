<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Novo Relatório</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/tela_administrador.css">

    <style>
        /* Ajustes específicos do formulário de relatório */
        #alerta-descricao {
            display: none;
            font-size: 0.85rem;
            border-radius: 0.5rem;
        }
        
        #contador-chars {
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        #contador-chars.valido {
            color: #059669; /* Verde esmeralda suave */
        }
        
        #contador-chars.invalido {
            color: #ef4444; /* Vermelho suave */
        }
        
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(77, 159, 231, 0.25);
            border-color: #4d9fe7;
        }
    </style>
</head>
<body>
    <div class="tela-responsavel">
        <aside class="sidebar">
            <div class="sidebar-brand d-flex align-items-center p-4">
                <img src="../css/logo-lumind.png" alt="Lumind" class="brand-logo" onerror="this.style.display='none'">
                <span class="h4 m-0 ms-2">Lumind</span>
            </div>
            <nav class="nav flex-column p-3">
                <a href="tela_responsavel.html" class="nav-link"><i class="bi bi-house-door-fill"></i> INICIAL</a>
                <a href="atividades_responsavel.html" class="nav-link"><i class="bi bi-clipboard-check"></i> ATIVIDADES</a>
                <a href="#" class="nav-link active"><i class="bi bi-journal-text"></i> RELATÓRIOS</a>
                <a href="#" id="logoff" class="nav-link"><i class="bi bi-box-arrow-right"></i> SAIR</a>
            </nav>
            <div class="sidebar-footer text-center p-3">
                <small>Versão 1.0</small>
            </div>
        </aside>

        <main class="main-panel">
            <header class="topbar d-flex justify-content-between align-items-center p-4">
                <div class="d-flex align-items-center">
                    <a href="lista_relatorios_responsavel.html" class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;" onmouseover="this.style.backgroundColor='#a8d6f5'" onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">NOVO RELATÓRIO</h2>
                </div>
                <div class="d-flex align-items-center">
                    <span id="nome-usuario" class="me-3 fw-semibold">Carregando...</span>
                </div>
            </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8">

                    <div id="alerta-global" class="alert d-none mb-4 rounded-3 shadow-sm border-0" role="alert"></div>

                    <div class="atividade-card bg-white border border-light-subtle shadow-sm rounded-4 overflow-hidden">
                        
                        <div class="card-header-activity bg-light p-4 border-bottom">
                            <h3 class="text-primary mb-0 fs-5 fw-bold"><i class="bi bi-pencil-square me-2"></i> Preencha os dados do relatório</h3>
                        </div>

                        <div class="card-body-activity p-4 p-md-5">
                            
                            <div class="mb-4">
                                <label for="select-dependente" class="form-label fw-bold text-muted small text-uppercase">
                                    <i class="bi bi-person-heart me-1"></i> Dependente <span class="text-danger">*</span>
                                </label>
                                <select id="select-dependente" class="form-select form-select-lg rounded-3 border-light-subtle bg-light text-dark" required>
                                    <option value="" disabled selected>Carregando dependentes...</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="input-data" class="form-label fw-bold text-muted small text-uppercase">
                                    <i class="bi bi-calendar-event me-1"></i> Data do Evento <span class="text-danger">*</span>
                                </label>
                                <input type="date" id="input-data" class="form-control form-control-lg rounded-3 border-light-subtle bg-light text-dark" required>
                                <small class="text-muted d-block mt-2" style="font-size: 0.8rem;">Selecione a data em que o evento ocorreu. Datas futuras não são permitidas.</small>
                            </div>

                            <div class="mb-5">
                                <label for="textarea-descricao" class="form-label fw-bold text-muted small text-uppercase">
                                    <i class="bi bi-card-text me-1"></i> Descrição Detalhada <span class="text-danger">*</span>
                                </label>
                                <textarea id="textarea-descricao"
                                          class="form-control rounded-3 border-light-subtle bg-light text-dark p-3"
                                          rows="7"
                                          placeholder="Descreva detalhadamente o evento, o comportamento observado, possíveis gatilhos ou informações relevantes para o acompanhamento..."
                                          style="resize: vertical; min-height: 150px;"
                                          required></textarea>
                                
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <div id="alerta-descricao" class="alert alert-warning py-1 px-3 mb-0 border-0 text-dark">
                                        <i class="bi bi-exclamation-triangle-fill me-1 text-warning"></i>
                                        Escreva pelo menos 30 caracteres
                                    </div>
                                    <span id="contador-chars" class="ms-auto invalido bg-white border rounded-pill px-3 py-1 shadow-sm">
                                        0/30 caracteres
                                    </span>
                                </div>
                            </div>

                            <button id="btn-salvar" class="btn btn-primary w-100 fw-bold py-3 rounded-pill shadow-sm d-flex align-items-center justify-content-center gap-2" style="font-size: 1.05rem; transition: all 0.2s;">
                                <span id="btn-text" class="d-flex align-items-center"><i class="bi bi-send-fill me-2"></i> ENVIAR RELATÓRIO</span>
                                <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                            
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script> 


    <script src="../js/responsavel/relatorio.js?v=2"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(['ResponsavelLegal']);
        }
    </script>
</body>
</html>
