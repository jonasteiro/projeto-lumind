<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Realizar Atividade</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../../css/tela_administrador.css">
    <link rel="stylesheet" href="../../css/atividades/tela_atividade.css">
</head>
<body style="background: #f8fcff;">
    
    <main class="w-100 min-vh-100 d-flex flex-column">
        
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0">
                
                <div class="d-flex align-items-center">
                    
                    <a href="../atividades_paciente.html"
                       id="link-back"
                       class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3"
                       style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;"
                       onmouseover="this.style.backgroundColor='#a8d6f5'"
                       onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>

                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">
                        REALIZAR ATIVIDADE
                    </h2>

                </div>

                <div class="d-flex align-items-center gap-3">

                    <div class="d-flex align-items-center border-end border-info pe-3">
                        <div class="d-flex justify-content-center align-items-center rounded-circle text-white shadow-sm" style="width: 42px; height: 42px; background: linear-gradient(145deg, #2f91e7 0%, #2a72b6 100%); font-weight: 700; font-size: 1.05rem; margin-right: 12px;" id="sidebarAvatar">
                            --
                        </div>
                        <div class="d-none d-sm-block text-end">
                            <span class="d-block fw-bold" style="color: #1f6389; font-size: 0.95rem; line-height: 1.1;" id="nome-usuario">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;">Paciente / Responsável</small>
                        </div>
                    </div>

                    <a href="#"
                       id="logoff"
                       class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm"
                       style="transition: all 0.2s;">
                        <i class="bi bi-box-arrow-right me-2 fs-5"></i> SAIR
                    </a>

                </div>
                
            </div>

        </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">

            <div id="estado-loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Carregando atividade...</p>
            </div>

            <div id="estado-erro" class="alert alert-danger d-none" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span id="mensagem-erro">Erro ao carregar a atividade.</span>
            </div>

            <div id="corpo-atividade" class="d-none mx-auto" style="max-width: 800px;">

                <div class="activity-card mb-4 bg-white p-4 rounded-4 shadow-sm border border-light-subtle">
                    <div class="activity-header mb-3">
                        <span id="badge-categoria" class="badge-categoria"></span>
                        <span id="badge-status" class="badge-status ms-2"></span>
                    </div>
                    <h3 id="titulo-atividade" class="activity-title text-dark fw-bold"></h3>
                    <p id="data-publicacao" class="activity-meta text-muted small">
                        <i class="bi bi-calendar-check me-1"></i>
                    </p>

                    <hr class="divider my-4 border-light-subtle">

                    <div class="section-label text-primary fw-semibold mb-2">
                        <i class="bi bi-text-paragraph me-2"></i>Descrição da Atividade
                    </div>
                    <div id="descricao-atividade" class="activity-description text-secondary"></div>
                </div>

                <div id="card-anexo" class="activity-card mb-4 d-none bg-white p-4 rounded-4 shadow-sm border border-light-subtle">
                    <div class="section-label text-primary fw-semibold mb-3">
                        <i class="bi bi-paperclip me-2"></i>Material de Apoio
                    </div>

                    <div id="container-imagem" class="d-none text-center">
                        <img id="imagem-anexo" src="" alt="Material de apoio"
                             class="img-fluid rounded-3 shadow-sm imagem-atividade">
                    </div>

                    <div id="container-pdf" class="d-none">
                        <a id="link-pdf" href="#" target="_blank" rel="noopener noreferrer"
                           class="btn-pdf w-100 btn btn-outline-primary fw-bold py-2">
                            <i class="bi bi-file-earmark-pdf-fill me-2"></i>
                            Abrir / Baixar Material de Apoio (PDF)
                        </a>
                    </div>
                </div>

                <div class="activity-card mb-4 bg-white p-4 rounded-4 shadow-sm border border-light-subtle">
                    <div class="section-label text-primary fw-semibold mb-3">
                        <i class="bi bi-pencil-square me-2"></i>Minha Resposta
                    </div>

                    <label for="comentario-paciente" class="form-label fw-semibold text-muted small">
                        Comentário sobre a atividade <span class="text-muted fw-normal">(opcional)</span>
                    </label>
                    <textarea
                        id="comentario-paciente"
                        class="form-control textarea-resposta rounded-3 bg-light"
                        rows="5"
                        placeholder="Conte como foi realizar essa atividade, se teve alguma dificuldade, o que achou..."></textarea>

                    <div id="feedback-msg" class="feedback-msg d-none mt-3 p-3 rounded-3 bg-light border"></div>

                    <button id="btn-concluir" class="btn-concluir mt-4 w-100 btn btn-success fw-bold py-3 rounded-pill shadow-sm">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span id="btn-concluir-texto">Marcar como Concluída</span>
                    </button>
                </div>

            </div>

        </section>
        
    </main>

    <script src="../../js/valida_sessao.js"></script>
    <script src="../../js/atividade/tela_atividade.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Aceita tanto PessoaTea quanto ResponsavelLegal
        if (typeof validarAcesso === "function") {
            validarAcesso(['PessoaTea', 'ResponsavelLegal']);
        }
    </script>
</body>
</html>
