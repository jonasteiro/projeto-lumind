<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Novo Cliente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/novo_exemplo.css">
</head>
<body class="bg-white">

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
        
        <div class="form-card w-100 p-4 p-md-5">
            
            <div class="d-flex justify-content-between align-items-start mb-4 pb-3 border-bottom border-light-subtle">
                <div>
                    <h1 class="h3 fw-bold text-dark mb-1">Novo Cliente</h1>
                    <p class="text-muted small mb-0">Preencha os dados abaixo para cadastrar.</p>
                </div>
                <a href="../home/" class="btn btn-outline-secondary btn-sm rounded-pill px-3 d-flex align-items-center gap-2">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>

            <form id="form-novo-cliente">
                
                <div class="form-floating mb-3">
                    <input type="text" class="form-control rounded-4 custom-input" id="nome" placeholder="Nome completo" required>
                    <label for="nome" class="text-muted"><i class="bi bi-person me-2"></i>Nome Completo</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control rounded-4 custom-input" id="email" placeholder="Email" required>
                    <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>Email</label>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-4 custom-input" id="usuario" placeholder="Usuário" required>
                            <label for="usuario" class="text-muted"><i class="bi bi-person-badge me-2"></i>Usuário</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="password" class="form-control rounded-4 custom-input" id="senha" placeholder="Senha" required>
                            <label for="senha" class="text-muted"><i class="bi bi-lock me-2"></i>Senha</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating mb-4">
                    <input type="text" class="form-control rounded-4 custom-input" id="instagram" placeholder="@instagram">
                    <label for="instagram" class="text-muted"><i class="bi bi-instagram me-2"></i>Instagram (sem @)</label>
                </div>

                <div class="form-check form-switch mb-4 ms-1">
                    <input class="form-check-input custom-switch" type="checkbox" role="switch" id="ativo" checked>
                    <label class="form-check-label text-dark fw-medium small" for="ativo">Cliente Ativo no Sistema</label>
                </div>

                <div class="mt-4">
                    <button type="submit" id="enviar" class="btn btn-primary-neutral w-100 rounded-pill fw-bold shadow-sm py-3">
                        Cadastrar Cliente
                    </button>
                </div>

            </form>

        </div>

    </div>

    <script src="../js/cliente_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
