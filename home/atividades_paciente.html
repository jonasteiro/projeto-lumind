<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Minhas Atividades</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/tela_administrador.css">
    <link rel="stylesheet" href="../css/atividades_paciente.css">
    
    <link rel="stylesheet" href="../css/tema_paciente.css">
</head>
<body id="body-paciente" style="transition: all 0.3s ease;">
    
    <main class="w-100 min-vh-100 d-flex flex-column main-panel m-0">
        
        <header class="topbar d-flex justify-content-center align-items-center p-3 border-bottom shadow-sm" id="topbar-dinamica" style="transition: all 0.3s ease;">
            
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0 flex-wrap gap-3">
                
                <div class="d-flex align-items-center">
                    <a href="tela_pessoa_tea.html" class="btn-back me-3 shadow-sm" data-tts="Voltar para a página inicial">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fs-4 mb-0 fw-bold tema-texto-principal text-uppercase" data-tts="Página das suas atividades.">MINHAS ATIVIDADES</h2>
                </div>

                <div class="d-flex align-items-center gap-3 flex-wrap justify-content-end">
                    
                    <div class="d-flex align-items-center px-3 py-1 rounded-pill shadow-sm border gap-2" id="box-seletor">
                        
                        <div class="d-flex align-items-center border-end pe-2 border-2">
                            <button class="btn btn-sm btn-outline-secondary border-0 rounded-circle fw-bold p-1 d-flex align-items-center justify-content-center" id="btnDiminuirFonte" title="Diminuir texto" style="width: 28px; height: 28px;">A-</button>
                            <button class="btn btn-sm btn-outline-secondary border-0 rounded-circle fw-bold p-1 d-flex align-items-center justify-content-center" id="btnAumentarFonte" title="Aumentar texto" style="width: 28px; height: 28px;">A+</button>
                        </div>

                        <div class="dropdown d-flex align-items-center border-end pe-2 border-2">
                            <button class="btn btn-sm btn-outline-secondary border-0 rounded-circle p-1 d-flex align-items-center justify-content-center" type="button" id="dropdownCursor" data-bs-toggle="dropdown" aria-expanded="false" title="Mudar Cursor do Mouse" style="width: 28px; height: 28px;">
                                <i class="bi bi-cursor-fill fs-5" id="iconeCursor"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 rounded-3 mt-2" aria-labelledby="dropdownCursor">
                                <li><a class="dropdown-item fw-semibold py-2 cursor-option" href="#" data-cursor="padrao">🖱️ Cursor Padrão</a></li>
                                <li><a class="dropdown-item fw-semibold py-2 cursor-option" href="#" data-cursor="gigante">👆 Seta Gigante</a></li>
                                <li><a class="dropdown-item fw-semibold py-2 cursor-option" href="#" data-cursor="patinha">🐾 Patinha</a></li>
                                <li><a class="dropdown-item fw-semibold py-2 cursor-option" href="#" data-cursor="estrela">⭐ Estrelinha</a></li>
                            </ul>
                        </div>

                        <div class="d-flex align-items-center border-end pe-2 border-2">
                            <button class="btn btn-sm btn-outline-secondary border-0 rounded-circle p-1 d-flex align-items-center justify-content-center" id="btnVozTema" title="Ativar/Desativar leitura de tela por voz" style="width: 28px; height: 28px;">
                                <i class="bi bi-volume-mute-fill fs-5" id="iconeVoz"></i>
                            </button>
                        </div>

                        <div class="d-flex align-items-center border-end pe-2 border-2">
                            <button class="btn btn-sm btn-outline-secondary border-0 rounded-circle p-1 d-flex align-items-center justify-content-center" id="btnModoEscuro" title="Ativar/Desativar Modo Noturno" style="width: 28px; height: 28px;">
                                <i class="bi bi-moon-fill fs-5" id="iconeModoEscuro"></i>
                            </button>
                        </div>

                        <div class="d-flex align-items-center gap-1">
                            <i class="bi bi-palette-fill tema-texto-principal fs-6"></i>
                            <input type="color" id="seletorTema" value="#167ebc" class="form-control form-control-color border-0 p-0 bg-transparent" style="width: 24px; height: 24px; cursor: pointer;" title="Escolha sua cor favorita">
                        </div>
                        
                        <button class="btn btn-sm btn-outline-secondary border-0 rounded-circle d-flex align-items-center justify-content-center p-1 ms-1" id="btnResetTema" title="Restaurar configurações padrões" style="width: 28px; height: 28px; transition: all 0.2s;">
                            <i class="bi bi-arrow-counterclockwise fs-5"></i>
                        </button>
                    </div>

                    <div class="d-none d-md-flex align-items-center border-end pe-3" id="sidebar-linha">
                        <div class="admin-avatar shadow-sm me-2" id="sidebarAvatar">--</div>
                        <div class="text-end">
                            <span class="d-block fw-bold tema-texto-principal" style="font-size: 0.95rem; line-height: 1.1;" id="sidebarNome">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;" id="sidebarCargo">Paciente</small>
                        </div>
                    </div>

                    <a href="#" id="logoff" class="btn btn-outline-danger fw-bold rounded-pill px-3 d-flex align-items-center shadow-sm" data-tts="Sair da sua conta." style="transition: all 0.2s;">
                        <i class="bi bi-box-arrow-right me-1 fs-5"></i> SAIR
                    </a>
                </div>
            </div>
        </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">
            
            <div class="filtros-container d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4 p-3 bg-white rounded-4 shadow-sm border border-light-subtle" id="box-seletor">
                
                <div class="search-box position-relative flex-grow-1" style="max-width: 350px;">
                    <i class="bi bi-search position-absolute text-muted" style="left: 16px; top: 50%; transform: translateY(-50%);"></i>
                    <input type="search" id="inputBusca" class="form-control rounded-pill bg-light border-light-subtle" placeholder="Buscar atividade..." style="padding-left: 2.8rem; padding-top: 0.6rem; padding-bottom: 0.6rem;">
                </div>

                <div class="d-flex flex-wrap gap-2 align-items-center" id="grupo-filtros-status">
                    <button type="button" class="btn btn-sm btn-primary rounded-pill px-3 py-2 fw-medium filtro-status active" data-status="Todos">Todos</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill px-3 py-2 fw-medium filtro-status" data-status="Pendente">⏳ Pendentes</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill px-3 py-2 fw-medium filtro-status" data-status="Concluída">✅ Concluídas</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill px-3 py-2 fw-medium filtro-status" data-status="Avaliada">⭐ Avaliadas</button>
                </div>

                <div style="min-width: 220px;">
                    <select id="filtroCategoria" class="form-select form-select-sm rounded-pill border-secondary-subtle fw-medium text-secondary py-2 px-3">
                        <option value="Todas">Todas as Especialidades</option>
                        <option value="Fonoaudiologia">Fonoaudiologia</option>
                        <option value="Psicologia">Psicologia</option>
                        <option value="Terapia Ocupacional">Terapia Ocupacional</option>
                        <option value="Pedagogia">Pedagogia</option>
                    </select>
                </div>

            </div>
            <div id="lista-atividades" class="row g-4">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p class="text-muted fs-5">Buscando suas tarefas...</p>
                </div>
            </div>
        </section>
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../js/tema_paciente.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script>
    
    <script src="../js/atividade/atividades_paciente.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(['PessoaTea', 'ResponsavelLegal']);
        }
    </script>
</body>
</html>
