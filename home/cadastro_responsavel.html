<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Cadastro de Responsável Legal</title>

    
    <!-- Fonts e Ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS Padronizado -->
    <link rel="stylesheet" href="../css/tela_administrador.css">

    <link rel="stylesheet" href="../css/responsavel/cadastro_responsavel.css">

</head>
<body style="background: #f8fcff;">
    
    <main class="w-100 min-vh-100 d-flex flex-column">
        
        <!-- TOPBAR -->
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0">
                
                <div class="d-flex align-items-center">
                    <a href="lista_responsavel.html" class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;" onmouseover="this.style.backgroundColor='#a8d6f5'" onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">CADASTRAR RESPONSÁVEL</h2>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center border-end border-info pe-3">
                        <div class="d-flex justify-content-center align-items-center rounded-circle text-white shadow-sm" style="width: 42px; height: 42px; background: linear-gradient(145deg, #2f91e7 0%, #2a72b6 100%); font-weight: 700; font-size: 1.05rem; margin-right: 12px;" id="sidebarAvatar">
                            --
                        </div>
                        <div class="d-none d-sm-block text-end">
                            <span class="d-block fw-bold" style="color: #1f6389; font-size: 0.95rem; line-height: 1.1;" id="sidebarNome">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;">Profissional / Admin</small>
                        </div>
                    </div>

                    <a href="#" id="logoff" class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm">
                        <i class="bi bi-box-arrow-right me-2 fs-5"></i> SAIR
                    </a>
                </div>
            </div>
        </header>

        <!-- CONTEÚDO PRINCIPAL -->
        <section class="content p-4 container-xl flex-grow-1 mt-3">
            <div class="atividade-card shadow-sm" style="max-width: 800px; margin: 0 auto; background: white; border-radius: 1.5rem; border: 1px solid rgba(0,0,0,0.05); overflow: hidden;">
                
                <div class="card-header-activity bg-light p-4 border-bottom">
                    <h3 class="text-primary mb-0 fs-5 fw-bold"><i class="bi bi-person-plus-fill me-2"></i> Novo Responsável Legal</h3>
                </div>

                <div class="card-body-activity p-4">
                    <p class="text-muted mb-4" style="font-size: 0.9rem;">Preencha os dados abaixo para registrar o responsável ou tutor pelo paciente.</p>

                    <form id="formCadastroResponsavel">
                        
                        <div class="mb-3">
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-3 border-light-subtle" id="nome" name="nome" placeholder="Nome completo" required maxlength="100">
                                <label for="nome" class="text-muted"><i class="bi bi-person me-2"></i>Nome Completo *</label>
                            </div>
                            <span class="text-danger small" id="erroNome"></span>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" class="form-control rounded-3 border-light-subtle" id="email" name="email" placeholder="Email" required maxlength="100">
                                    <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>Email (Login) *</label>
                                </div>
                                <span class="text-danger small" id="erroEmail"></span>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control rounded-3 border-light-subtle" id="cpf" name="cpf" placeholder="CPF" required maxlength="14">
                                    <label for="cpf" class="text-muted"><i class="bi bi-card-text me-2"></i>CPF *</label>
                                </div>
                                <span class="text-danger small" id="erroCpf"></span>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="tel" class="form-control rounded-3 border-light-subtle" id="telefone" name="telefone" placeholder="Telefone" required maxlength="15">
                                    <label for="telefone" class="text-muted"><i class="bi bi-whatsapp me-2"></i>Telefone / WhatsApp *</label>
                                </div>
                                <span class="text-danger small" id="erroTelefone"></span>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="date" class="form-control rounded-3 border-light-subtle" id="data_nascimento" name="data_nascimento" required>
                                    <label for="data_nascimento" class="text-muted"><i class="bi bi-calendar-event me-2"></i>Data de Nascimento *</label>
                                </div>
                                <span class="text-danger small" id="erroData"></span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="form-floating">
                                <input type="password" class="form-control rounded-3 border-light-subtle" id="senha" name="senha" placeholder="Senha" required minlength="6">
                                <label for="senha" class="text-muted"><i class="bi bi-lock me-2"></i>Senha de Acesso *</label>
                            </div>
                            <small class="text-muted ms-2" style="font-size: 0.75rem;">Mínimo 6 caracteres.</small>
                            <span class="text-danger small d-block" id="erroSenha"></span>
                        </div>

                        <div id="divErro" class="alert alert-danger d-none py-2 mt-3" style="font-size: 0.85rem;"></div>
                        <div id="divSucesso" class="alert alert-success d-none py-2 mt-3" style="font-size: 0.85rem;"></div>
                    </form>
                </div>

                <div class="card-footer-activity p-3 bg-light border-top">
                    <div class="btn-group-card d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-outline-secondary px-4 py-2 fw-semibold rounded-3" onclick="document.getElementById('formCadastroResponsavel').reset();">
                            <i class="bi bi-arrow-counterclockwise me-1"></i> Limpar
                        </button>
                        <button type="submit" form="formCadastroResponsavel" class="btn btn-primary px-4 py-2 fw-semibold rounded-3 shadow-sm">
                            <i class="bi bi-person-check-fill me-1"></i> Cadastrar Responsável
                        </button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script>
    <script src="../js/responsavel/responsavel_novo.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso(['ProfissionalSaude', 'Administrador']); 
        }
    </script>
</body>
</html>
