<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Atividades do Dependente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/atividades_paciente.css">
    <link rel="stylesheet" href="../css/tela_responsavel.css">

    <style>
        /* Ajustes de layout para tela sem sidebar */
        body { background: #f8fcff; }
        .main-panel-full { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Ajustes no input de busca para visual premium */
        .search-box input:focus {
            box-shadow: 0 0 0 0.25rem rgba(22, 126, 188, 0.25);
            border-color: #167ebc;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="main-panel-full">
        
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0">
                
                <div class="d-flex align-items-center">
                    <a href="tela_responsavel.html" class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;" onmouseover="this.style.backgroundColor='#a8d6f5'" onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">ATIVIDADES DO DEPENDENTE</h2>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center border-end border-info pe-3">
                        <div class="d-flex justify-content-center align-items-center rounded-circle text-white shadow-sm" style="width: 42px; height: 42px; background: linear-gradient(145deg, #2f91e7 0%, #2a72b6 100%); font-weight: 700; font-size: 1.05rem; margin-right: 12px;" id="sidebarAvatar">
                            --
                        </div>
                        <div class="d-none d-sm-block text-end">
                            <span class="d-block fw-bold" style="color: #1f6389; font-size: 0.95rem; line-height: 1.1;" id="nome-usuario">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;">Responsável Legal</small>
                        </div>
                    </div>

                    <a href="#" id="logoff" class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm">
                        <i class="bi bi-box-arrow-right me-2 fs-5"></i> SAIR
                    </a>
                </div>
            </div>
        </header>

        <main class="content p-4 container-xl flex-grow-1 mt-3">
            
            <div class="search-container mb-4 d-flex justify-content-between align-items-center">
                <p class="text-muted mb-0 fw-medium">Acompanhe e gerencie as atividades.</p>
                
                <div class="search-box position-relative">
                    <i class="bi bi-search position-absolute text-muted" style="left: 16px; top: 50%; transform: translateY(-50%);"></i>
                    <input type="search" id="inputBusca" class="form-control rounded-pill bg-white shadow-sm border-light-subtle" placeholder="Buscar atividade..." style="padding-left: 2.5rem; width: 300px;">
                </div>
            </div>

            <div id="lista-atividades" class="row g-4">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p class="text-muted fs-5">Buscando atividades do dependente...</p>
                </div>
            </div>
            
        </main>
    </div>

    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script>
    <script src="../js/atividade/atividades_responsavel.js"></script>
    
    <script>
        // Apenas ResponsavelLegal pode acessar esta rota
        if (typeof validarAcesso === "function") {
            validarAcesso(['ResponsavelLegal']);
        }
    </script>
</body>
</html>
