<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Cadastro de Profissional</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/login.css">
    <style>
        .msg-erro {
            color: #dc3545;
            font-size: 0.75rem;
            font-weight: 600;
            display: none;
            margin-top: 5px;
        }
        .msg-erro.show {
            display: block;
        }
        .login-modal {
            max-width: 700px;
        }
    </style>
</head>
<body>

    <div class="login-container px-3 my-5">
        <div class="login-modal shadow-lg p-4 p-md-5">
            
            <div class="text-center mb-4">
                <h1 class="login-title mb-2">Seja um Profissional Lumind</h1>
                <p class="login-subtitle">Preencha os dados abaixo para análise de perfil</p>
            </div>

            <div id="mensagem-retorno" class="alert d-none" role="alert"></div>

            <form id="form-cadastro-prof" enctype="multipart/form-data">
                <input type="hidden" name="tipo_usuario" value="ProfissionalSaude">

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small fw-bold text-muted">Nome Completo</label>
                        <input type="text" name="nome" id="nome" class="form-control rounded-3" placeholder="Ex: Maria Silva" required>
                        <span class="msg-erro" id="erroNome"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">E-mail</label>
                        <input type="email" name="email" id="email" class="form-control rounded-3" placeholder="seu@email.com" required>
                        <span class="msg-erro" id="erroEmail"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">CPF (somente números)</label>
                        <input type="text" name="cpf" id="cpf" maxlength="11" class="form-control rounded-3" placeholder="00000000000" required>
                        <span class="msg-erro" id="erroCpf"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Registro Profissional (CRP/CRM)</label>
                        <input type="text" name="registro_profissional" id="registro_profissional" class="form-control rounded-3" required>
                        <span class="msg-erro" id="erroRegistro"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Especialidade</label>
                        <input type="text" name="especialidade" id="especialidade" class="form-control rounded-3" placeholder="Ex: Psicologia Infantil" required>
                        <span class="msg-erro" id="erroEspecialidade"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Data de Nascimento</label>
                        <input type="date" name="data_nascimento" id="data_nascimento" class="form-control rounded-3" required>
                        <span class="msg-erro" id="erroData"></span>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Telefone</label>
                        <input type="text" name="telefone" id="telefone" class="form-control rounded-3" placeholder="41999999999">
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label small fw-bold text-muted">Crie sua Senha</label>
                        <input type="password" name="senha" id="senha" class="form-control rounded-3" required>
                        <span class="msg-erro" id="erroSenha"></span>
                    </div>
                </div>

                <div class="p-3 bg-light rounded-4 mb-4 border">
                    <h6 class="fw-bold mb-3"><i class="bi bi-shield-check me-2 text-success"></i>Documentação Obrigatória</h6>
                    
                    <div class="mb-3">
                        <label class="form-label small text-muted">Certificação Profissional (Diploma ou Certificado)</label>
                        <input type="file" name="certificacao_profissional" id="certificacao" class="form-control form-control-sm" accept=".pdf,image/*" required>
                        <span class="msg-erro" id="erroCertificacao">Selecione o arquivo de certificação.</span>
                    </div>

                    <div class="mb-0">
                        <label class="form-label small text-muted">Documento de Identidade (RG ou CNH)</label>
                        <input type="file" name="carteira_identidade_nacional" id="identidade" class="form-control form-control-sm" accept=".pdf,image/*" required>
                        <span class="msg-erro" id="erroIdentidade">Selecione o arquivo de identidade.</span>
                    </div>
                </div>

                <button type="submit" id="btn-cadastrar" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm">
                    <span id="btn-text">Enviar Solicitação</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm d-none"></span>
                </button>
                
                <div class="text-center mt-3">
                    <a href="../login/index.html" class="text-decoration-none small text-success fw-bold">Já possui conta? Faça login</a>
                </div>

                <div class="text-center mt-3">
                    <a href="../home/status_profissional.html" class="text-decoration-none small text-success fw-bold">Verifique seu cadastro</a>
                </div>
            </form>
            
        </div>
    </div>

    <script src="../js/profissional_saude/profissional_novo.js"></script>
</body>
</html>
