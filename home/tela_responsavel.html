<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Painel Responsável</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/tela_responsavel.css">
</head>
<body>
    <div class="tela-responsavel">
        <aside class="sidebar">
            <div class="brand-container text-center py-4 border-bottom border-info border-opacity-25">
                <img src="../css/logo-lumind.png" alt="Lumind" class="img-fluid" style="width: 120px; height: auto;" onerror="this.style.display='none'">
            </div>

            <div class="member-list p-3 border-bottom border-info border-opacity-25">
                <div class="member-item d-flex align-items-center mb-3 gap-3">
                    <div class="d-flex justify-content-center align-items-center rounded-circle text-white flex-shrink-0"
                         style="width: 46px; height: 46px; background: linear-gradient(145deg, #9cd1ff 10%, #0c8fd6 90%); font-weight: 700; font-size: 1.05rem;"
                         id="sidebarAvatar">
                        --
                    </div>
                    <div>
                        <strong id="sidebarNome" style="font-size: 0.95rem; color: #1f6389;"></strong>
                        <small class="d-block text-muted">Responsável</small>
                    </div>
                </div>
                <div id="lista-dependentes-sidebar"></div>
            </div>

            <nav class="nav flex-column p-3">
                <a href="#" class="nav-link active"><i class="bi bi-house-door-fill"></i> INICIAL</a>
                <a href="#" class="nav-link"><i class="bi bi-gear-fill"></i> CONFIGURAÇÕES</a>
                <a href="#" id="logoff" class="nav-link nav-link-sair">
                    <i class="bi bi-box-arrow-right"></i> SAIR
                </a>
            </nav>

            <div class="sidebar-footer text-center p-3">
                <small>Versão 1.0</small>
            </div>
        </aside>

        <main class="main-panel">
            <header class="topbar d-flex align-items-center p-4">
                <h2>PAINEL RESPONSÁVEL</h2>
            </header>

            <section class="content p-4">
                <div class="row g-4">
                    <div class="col-sm-6 col-lg-4">
                        <article class="card-option p-4 text-center"
                                onclick="location.href='atividades_responsavel.html'"
                                style="cursor: pointer;">
                            <i class="bi bi-clipboard-check icon"></i>
                            <h4>ATIVIDADES</h4>
                            <p>Acompanhar as atividades enviadas</p>
                        </article>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <article class="card-option p-4 text-center">
                            <i class="bi bi-calendar3 icon"></i>
                            <h4>EVENTOS</h4>
                            <p>Registrar eventos</p>
                        </article>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <article class="card-option p-4 text-center"
                                onclick="location.href='lista_relatorios_responsavel.html'"
                                style="cursor: pointer;">
                            <i class="bi bi-journal-text icon"></i>
                            <h4>RELATÓRIOS</h4>
                            <p>Realizar relatórios diários do paciente</p>
                        </article>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <article class="card-option p-4 text-center">
                            <i class="bi bi-chat-dots icon"></i>
                            <h4>COMUNICAÇÃO E SUPORTE</h4>
                            <p>Comunicar falhas sobre o sistema</p>
                        </article>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <article class="card-option p-4 text-center">
                            <i class="bi bi-pencil icon"></i>
                            <h4>DICAS</h4>
                            <p>Dicas para o responsável</p>
                        </article>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/valida_sessao.js"></script>
    <script src="../js/index.js"></script>
    <script>
        if (typeof validarAcesso === "function") {
            validarAcesso('ResponsavelLegal');
        }
    </script>
</body>
</html>
