<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Editar Pessoa TEA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/novo_exemplo.css">
</head>
<body class="bg-white">

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
        <div class="form-card w-100 p-4 p-md-5">
            
            <div class="d-flex justify-content-between align-items-start mb-4 pb-3 border-bottom border-light-subtle">
                <div>
                    <h1 class="h3 fw-bold text-dark mb-1">Editar Pessoa TEA</h1>
                    <p class="text-muted small mb-0">Atualize as informações clínicas e de cadastro.</p>
                </div>
                <a href="lista_pessoa_tea.html" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>

            <form id="form-alterar-pessoa-tea">
                <input type="hidden" id="id_usuario">

                <div class="mb-3">
                    <div class="form-floating">
                        <input type="text" class="form-control rounded-4 custom-input" id="nome" placeholder="Nome completo" required>
                        <label for="nome"><i class="bi bi-person me-2"></i>Nome Completo *</label>
                    </div>
                    <span class="form-error" id="erroNome"></span>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="email" class="form-control rounded-4 custom-input" id="email" placeholder="Email" required>
                            <label for="email"><i class="bi bi-envelope me-2"></i>Email *</label>
                        </div>
                        <span class="form-error" id="erroEmail"></span>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-4 custom-input" id="cpf" placeholder="CPF" required maxlength="11">
                            <label for="cpf"><i class="bi bi-card-text me-2"></i>CPF *</label>
                        </div>
                        <span class="form-error" id="erroCpf"></span>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="date" class="form-control rounded-4 custom-input" id="data_nascimento" required>
                            <label for="data_nascimento"><i class="bi bi-calendar-event me-2"></i>Data de Nascimento *</label>
                        </div>
                        <span class="form-error" id="erroData"></span>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <select id="nivel_tea" class="form-select rounded-4 custom-input" required>
                                <option value="">Selecione o nível</option>
                                <option value="Nível 1 - Suporte Leve">Nível 1 - Suporte Leve</option>
                                <option value="Nível 2 - Suporte Moderado">Nível 2 - Suporte Moderado</option>
                                <option value="Nível 3 - Suporte Substancial">Nível 3 - Suporte Substancial</option>
                            </select>
                            <label for="nivel_tea"><i class="bi bi-activity me-2"></i>Nível de Suporte *</label>
                        </div>
                        <span class="form-error" id="erroNivel"></span>
                    </div>
                </div>

                <div class="form-floating mb-3">
                    <textarea class="form-control rounded-4 custom-input" id="observacao" style="height: 100px" placeholder="Observações"></textarea>
                    <label for="observacao"><i class="bi bi-journal-text me-2"></i>Observações Clínicas</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" class="form-control rounded-4 custom-input" id="senha" placeholder="Nova Senha">
                    <label for="senha"><i class="bi bi-lock me-2"></i>Nova Senha (opcional)</label>
                </div>

                <div id="divErro" class="alert alert-danger p-3"></div>
                <div id="divSucesso" class="alert alert-success p-3"></div>

                <div class="mt-4">
                    <button type="submit" id="btnEnviar" class="btn btn-warning w-100 rounded-pill fw-bold shadow-sm py-3 text-dark">
                        <i class="bi bi-save me-2"></i> Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/pessoa_tea.js/pessoa_tea_alterar.js"></script>
</body>
</html>
