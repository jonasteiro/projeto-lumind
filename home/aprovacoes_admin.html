<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Gestão de Aprovações</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/administrador/decisao-admin.css">
    
    <script src="../js/valida_sessao.js" defer></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4 py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <button onclick="window.location.href='tela_administrador.html'" class="btn btn-link text-decoration-none p-0 me-3" title="Voltar">
                    <i class="bi bi-arrow-left fs-4 text-dark"></i>
                </button>
                <h1 class="h5 mb-0 fw-bold" style="color: #4A89DC;">Lumind Admin</h1>
            </div>
            
            <button id="logoff" class="btn btn-outline-secondary btn-sm rounded-pill px-4">Sair</button>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Solicitações de Profissionais</h2>
            <span class="badge badge-aguardando px-3 py-2" id="contador-pendentes">Carregando...</span>
        </div>

        <div id="alerta-global" class="alert d-none" role="alert"></div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4 py-3 border-bottom-0">Profissional</th>
                                <th class="py-3 border-bottom-0">Registro / Especialidade</th>
                                <th class="py-3 border-bottom-0">Documentos</th>
                                <th class="text-end pe-4 py-3 border-bottom-0">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-pendentes">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalReprovar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Motivo da Reprovação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <textarea id="motivo-texto" class="form-control bg-light" rows="4" placeholder="Descreva o motivo claro para o profissional..."></textarea>
                    <input type="hidden" id="reprovar-id-usuario">
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger px-4" id="btn-confirmar-reprovar">Confirmar Reprovação</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPreview" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light border-bottom-0">
                    <h5 class="modal-title fw-bold" id="titulo-preview">Visualizar Documento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="conteudo-preview" class="text-center bg-light">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/admin/admin_aprovacoes.js"></script>
    <script src="../js/index.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof validarAcesso === "function") {
                validarAcesso('Administrador');
            }
        });
    </script>
</body>
</html>
