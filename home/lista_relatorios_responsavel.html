<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Meus Relatórios</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/tela_administrador.css">
</head>
<body style="background: #f8fcff;">
    
    <main class="w-100 min-vh-100 d-flex flex-column">
        
        <header class="topbar d-flex justify-content-center align-items-center p-4 border-bottom shadow-sm" style="background-color: #d5efff;">
            <div class="d-flex justify-content-between align-items-center container-xl w-100 px-0">
                
                <div class="d-flex align-items-center">
                    <a href="tela_responsavel.html" class="d-inline-flex align-items-center justify-content-center rounded-circle text-decoration-none me-3" style="width: 44px; height: 44px; background-color: #bce2f9; color: #1474a8; transition: all 0.2s;" onmouseover="this.style.backgroundColor='#a8d6f5'" onmouseout="this.style.backgroundColor='#bce2f9'">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fs-4 mb-0 fw-bold" style="color: #167ebc; letter-spacing: 0.5px;">MEUS RELATÓRIOS</h2>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center border-end border-info pe-3">
                        <div class="d-flex justify-content-center align-items-center rounded-circle text-white shadow-sm" style="width: 42px; height: 42px; background: linear-gradient(145deg, #2f91e7 0%, #2a72b6 100%); font-weight: 700; font-size: 1.05rem; margin-right: 12px;" id="sidebarAvatar">
                            --
                        </div>
                        <div class="d-none d-sm-block text-end">
                            <span class="d-block fw-bold" style="color: #1f6389; font-size: 0.95rem; line-height: 1.1;" id="sidebarNome">Carregando...</span>
                            <small class="text-muted" style="font-size: 0.8rem;">Responsável</small>
                        </div>
                    </div>

                    <a href="#" id="logoff" class="btn btn-outline-danger fw-bold rounded-pill px-4 d-flex align-items-center shadow-sm">
                        <i class="bi bi-box-arrow-right me-2 fs-5"></i> SAIR
                    </a>
                </div>
            </div>
        </header>

        <section class="content p-4 container-xl flex-grow-1 mt-3">

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 pb-3 border-bottom border-light-subtle gap-3">
                <div>
                    <h2 class="h4 mb-1 fw-bold text-dark">
                        Relatórios Enviados
                    </h2>
                    <p class="text-muted small mb-0">
                        Acompanhe o histórico de observações sobre as atividades e comportamento.
                    </p>
                </div>

                <a href="relatorio_responsavel.html" class="btn btn-primary rounded-pill fw-semibold shadow-sm px-4 d-flex align-items-center gap-2">
                    <i class="bi bi-plus-lg"></i> Novo Relatório
                </a>
            </div>

            <div id="lista-relatorios" class="row g-4">
                <div class="text-center py-5 w-100">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                    <p class="mt-2 text-muted">Buscando seus relatórios no sistema...</p>
                </div>
            </div>

        </section>
    </main>

    <!-- INÍCIO DO MODAL DE DETALHES -->
    <div class="modal fade" id="modalRelatorio" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="modal-header bg-light border-bottom p-4">
                    <h5 class="modal-title fw-bold" style="color: #167ebc;">
                        <i class="bi bi-file-earmark-text me-2"></i> Detalhes do Relatório
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body p-4 p-md-5">
                    
                    <!-- 1. CAMPO VARCHAR: Título do Relatório -->
                    <h4 id="modal-titulo-relatorio" class="fw-bold mb-4 text-dark">Carregando título...</h4>
                    
                    <!-- GRID PARA DADOS CURTOS (Incluindo INT, FLOAT e DATE) -->
                    <div class="row g-3 mb-4 bg-light p-3 rounded-3 border border-light-subtle align-items-center">
                        
                        <div class="col-6 col-md-3 border-end border-light-subtle">
                            <label class="text-muted small text-uppercase fw-bold"><i class="bi bi-calendar-event me-1"></i> Data de Envio</label>
                            <p id="modal-data" class="mb-0 fw-bold fs-6 text-dark">--</p>
                        </div>

                        <!-- 2. CAMPO INT: Duração -->
                        <div class="col-6 col-md-3 border-end-md border-light-subtle">
                            <label class="text-muted small text-uppercase fw-bold"><i class="bi bi-clock-history me-1"></i> Duração</label>
                            <p id="modal-duracao" class="mb-0 fw-bold fs-6 text-dark">--</p>
                        </div>

                        <!-- 3. CAMPO DATE: Próxima Avaliação -->
                        <div class="col-6 col-md-3 border-end border-light-subtle">
                            <label class="text-muted small text-uppercase fw-bold"><i class="bi bi-calendar-plus me-1"></i> Retorno</label>
                            <p id="modal-data-prox" class="mb-0 fw-bold fs-6 text-dark">--</p>
                        </div>

                        <!-- 4. CAMPO FLOAT: Progresso -->
                        <div class="col-6 col-md-3">
                            <label class="text-muted small text-uppercase fw-bold"><i class="bi bi-graph-up-arrow me-1"></i> Progresso</label>
                            <p id="modal-progresso" class="mb-0 fw-bold fs-6 text-primary">--</p>
                        </div>

                    </div>
                    
                    <!-- DESCRIÇÃO ORIGINAL -->
                    <div class="mb-4">
                        <label class="text-muted small text-uppercase fw-bold mb-2"><i class="bi bi-card-text me-1"></i> Descrição Completa</label>
                        <div id="modal-descricao" class="p-4 bg-white rounded-3 border border-light-subtle shadow-sm" 
                             style="white-space: pre-wrap; word-wrap: break-word; min-height: 100px; max-height: 250px; overflow-y: auto; color: #495057; font-size: 0.95rem; line-height: 1.6;">
                        </div>
                    </div>

                    <!-- 5. CAMPO TEXT: Recomendações para Casa -->
                    <div class="mb-0">
                        <label class="text-muted small text-uppercase fw-bold mb-2"><i class="bi bi-house-heart me-1"></i> Recomendações para Casa</label>
                        <div id="modal-recomendacoes" class="p-4 rounded-3 border border-info-subtle shadow-sm" 
                             style="background-color: #f0f9ff; white-space: pre-wrap; word-wrap: break-word; color: #055160; font-size: 0.95rem; line-height: 1.6;">
                        </div>
                    </div>
                    
                    <div id="modal-observacoes"></div>
                    
                </div>
                
                <div class="modal-footer border-top bg-light p-3">
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4 fw-semibold" data-bs-dismiss="modal">
                        Fechar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- FIM DO MODAL -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/valida_sessao.js"></script>
    <script src="../js/responsavel/lista_relatorios.js"></script>
    <script src="../js/index.js"></script>
    <script>
        // Verificação de acesso para Responsável Legal, caso tenha implementado
        if (typeof validarAcesso === "function") {
            validarAcesso(['ResponsavelLegal']);
        }
    </script>
</body>
</html>
