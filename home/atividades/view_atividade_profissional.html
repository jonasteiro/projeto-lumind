<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Avaliação de Atividade</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../css/atividades/tela_atividade.css">
</head>
<body>
    <div class="d-flex">
         <aside class="sidebar">
            <div class="brand-container text-center py-4">
                <img src="../../css/logo-lumind.png" alt="Lumind" class="img-fluid" style="width: 120px; height: auto;" onerror="this.style.display='none'">
            </div>
            <nav class="nav-menu">
                <a href="../tela_profissional.html"><i class="bi bi-house-door"></i> Início</a>
                <a href="../atividades_painel.html" class="active"><i class="bi bi-clipboard-check"></i> Atividades</a>
                <a href="#"><i class="bi bi-bar-chart"></i> Desempenho</a>
                <hr>
              
            </nav>
        </aside>

        <main class="main-panel flex-grow-1">
            <header class="topbar d-flex justify-content-between align-items-center p-4">
                <div class="d-flex align-items-center">
                    <a href="../atividades_painel.html" class="btn-back">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h2>AVALIAR ATIVIDADE</h2>
                </div>
                <div class="user-profile d-flex align-items-center">
                    <span id="nome-usuario" class="user-name me-3">Carregando...</span>
                </div>
            </header>

            <section class="content p-4">
                <div class="activity-card">
                    <h3 id="titulo-atividade">Carregando...</h3>
                    <div class="activity-header">
                        <span class="badge-categoria" id="categoria-atividade">Categoria</span>
                        <span class="activity-meta" id="data-atividade">Data</span>
                    </div>
                    
                    <hr class="divider">
                    
                    <div>
                        <p class="section-label"><i class="bi bi-file-text"></i> Descrição</p>
                        <div class="activity-description" id="descricao-atividade">Carregando...</div>
                    </div>

                    <!--Adicionar novo campo  de GET para ATIVIDADE
                    
                    <div class="mt-4">
                        <p class="section-label"><i class="bi bi-star"></i> Novo Campo (Teste)</p>
                        <div class="activity-description" id="novocampo-atividade">Carregando...</div>
                    </div>
                    -->
                    
                    <hr class="divider">

            
                    <div id="container-anexo" style="display: none;">
                        <p class="section-label"><i class="bi bi-paperclip"></i> Anexo da Atividade</p>
                        <div id="anexo-content"></div>
                        <hr class="divider">
                    </div>

                    <div>
                        <p class="section-label"><i class="bi bi-checklist"></i> Submissões dos Pacientes</p>
                        <div id="submissoes-list" class="submissoes-container">
                            <p class="text-center text-muted">Carregando submissões...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>


    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header border-bottom">
                    <h5 class="modal-title">Dar Feedback para <span id="modal-patient-name"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="feedbackForm">
                        <div class="mb-3">
                            <label class="form-label">Feedback Profissional</label>
                            <textarea class="form-control" id="feedbackText" name="feedback" rows="5" placeholder="Escreva seu feedback sobre a atividade realizada..." maxlength="1000" required></textarea>
                            <small class="text-muted" id="charCount">0/1000</small>
                        </div>

                        <!-- PASSO 2: Campo NOVO para FEEDBACK -->
                         <!--
                        <div class="mb-3">
                            <label for="nota_feedback" class="form-label fw-bold">Nota da Atividade</label>
                            <input type="text" class="form-control" id="nota_feedback" name="nota_feedback" placeholder="Ex: 10 ou Excelente" maxlength="50">
                        </div>
                        -->



                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="submitFeedback">Enviar Feedback</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../../js/valida_sessao.js"></script>
    <script src="../../js/atividade/view_atividade_profissional.js"></script>
    <script>
        validarAcesso('ProfissionalSaude');
    </script>
</body>
</html>
