<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Profissional</title>
</head>
<body>
    <div>
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" required>
    </div>

    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" required>
    </div>

    <div>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" required>
    </div>

    <div>
        <label for="data_nascimento">Data de Nascimento:</label>
        <input type="date" id="data_nascimento" required>
    </div>

    <div>
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone">
    </div>

    <div>
        <label for="especialidade">Especialidade:</label>
        <input type="text" id="especialidade" required>
    </div>

    <div>
        <label for="registro_profissional">Registro Profissional:</label>
        <input type="text" id="registro_profissional" required>
    </div>

    <!--
    <div>
        <label for="cip">Documento CIP (PDF ou Imagem):</label>
        <input type="file" id="cip" accept="image/*" required>
    </div>
    
    <div>
        <label for="cin">Documento CIN (PDF ou Imagem):</label>
        <input type="file" id="cin" accept="image/*" required>
    </div>
    -->
    
    <div>
        <button type="button" id="enviar">Cadastrar Profissional</button>
    </div>
    
</body>
</html>
