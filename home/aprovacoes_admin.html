<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumind | Gestão de Aprovações</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; color: #198754; }
        .card { border: none; border-radius: 15px; }
        .table thead { background-color: #f1f3f5; }
        .badge-aguardando { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        /* Ajuste para o iframe de visualização */
        #conteudo-preview iframe {
            width: 100%;
            height: 70vh;
            border: none;
            border-radius: 0 0 15px 15px;
        }
    </style>

    <script src="../js/valida_sessao.js" defer></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Lumind Admin</a>
            <button class="btn btn-outline-danger btn-sm" onclick="encerrarSessao()">Sair</button>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Solicitações de Profissionais</h2>
            <span class="badge badge-aguardando px-3 py-2" id="contador-pendentes">Carregando...</span>
        </div>

        <div id="alerta-global" class="alert d-none" role="alert"></div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Profissional</th>
                                <th>Registro / Especialidade</th>
                                <th>Documentos</th>
                                <th class="text-end pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-pendentes">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalReprovar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Motivo da Reprovação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <textarea id="motivo-texto" class="form-control" rows="4" placeholder="Descreva o motivo..."></textarea>
                    <input type="hidden" id="reprovar-id-usuario">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger px-4" id="btn-confirmar-reprovar">Confirmar Reprovação</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPreview" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold" id="titulo-preview">Visualizar Documento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="conteudo-preview" class="text-center">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/admin/admin_aprovacoes.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            validarAcesso('Administrador');
        });
    </script>
</body>
</html>
