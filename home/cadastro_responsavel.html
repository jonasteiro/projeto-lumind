<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Responsável - Lumind</title>
    <link rel="stylesheet" href="../css/cadastro_responsavel.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>Cadastro de Responsável</h1>
                <p class="subtitle">Criar novo perfil de responsável do sistema</p>
            </div>
            <button class="btn-voltar" onclick="voltarPerfis()">← Voltar</button>
        </header>

        <main class="form-container">
            <form id="formCadastroResponsavel" class="formulario-adm">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input 
                        type="text" 
                        id="nome" 
                        name="nome" 
                        placeholder="Digite o nome completo" 
                        required
                        maxlength="100"
                    >
                    <span class="form-error" id="erroNome"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="exemplo@email.com" 
                            required
                            maxlength="100"
                        >
                        <span class="form-error" id="erroEmail"></span>
                    </div>

                    <div class="form-group">
                        <label for="usuario">Nome de Usuário *</label>
                        <input 
                            type="text" 
                            id="usuario" 
                            name="usuario" 
                            placeholder="usuario_responsavel" 
                            required
                            maxlength="50"
                        >
                        <span class="form-error" id="erroUsuario"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="senha">Senha *</label>
                        <input 
                            type="password" 
                            id="senha" 
                            name="senha" 
                            placeholder="Digite uma senha segura" 
                            required
                            minlength="6"
                        >
                        <span class="form-error" id="erroSenha"></span>
                        <small class="form-hint">Mínimo 6 caracteres</small>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input 
                            type="tel" 
                            id="telefone" 
                            name="telefone" 
                            placeholder="(99) 99999-9999"
                            maxlength="20"
                        >
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="endereco">Endereço</label>
                        <input 
                            type="text" 
                            id="endereco" 
                            name="endereco" 
                            placeholder="Rua, número, bairro, cidade"
                            maxlength="255"
                        >
                    </div>
                    <div class="form-group">
                        <label for="tipo_responsabilidade">Tipo de Responsabilidade *</label>
                        <select id="tipo_responsabilidade" name="tipo_responsabilidade" required>
                            <option value="">Selecione...</option>
                            <option value="pai">Pai</option>
                            <option value="mae">Mãe</option>
                            <option value="cuidador">Cuidador</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input 
                            type="checkbox" 
                            id="ativo" 
                            name="ativo" 
                            checked
                        >
                        <span>Ativar responsável imediatamente</span>
                    </label>
                </div>

                <div id="divErro" class="alert alert-error" style="display: none;"></div>
                <div id="divSucesso" class="alert alert-success" style="display: none;"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <span>💾</span> Cadastrar Responsável
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                        <span>🔄</span> Limpar
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script>
        function voltarPerfis() {
            window.location.href = 'index.html';
        }
        function limparFormulario() {
            document.getElementById('formCadastroResponsavel').reset();
            document.querySelectorAll('.form-error').forEach(e => e.textContent = '');
            document.getElementById('divErro').style.display = 'none';
            document.getElementById('divSucesso').style.display = 'none';
        }
    </script>
</body>
</html>
